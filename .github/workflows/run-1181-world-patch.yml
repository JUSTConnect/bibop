name: Run 1181 Semantic Patch

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/run-1181-world-patch.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'feature/power-entities-1181'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/power-entities-1181
          fetch-depth: 0
      - name: Apply semantic integration
        run: python3 tools/apply_1181_semantic_patch.py
      - name: Commit semantic integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/world/entity_contract_fixtures.gd scripts/world/entity_status_evaluator.gd scripts/world/entity_definition_contract.gd scripts/world/power_control_resolver.gd tools/ci/check_entity_contract_consistency.gd .github/workflows/godot-parser-gate.yml
          git commit -m "feat(power): integrate stationary power semantic contracts"
          git pull --rebase origin feature/power-entities-1181
          git push origin HEAD:feature/power-entities-1181
