name: Run 1181 Semantic Patch

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/run-1181-world-patch.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'feature/power-entities-1181'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/power-entities-1181
          fetch-depth: 0
      - name: Apply semantic integration
        run: python3 tools/apply_1181_semantic_patch.py
      - name: Commit semantic integration atomically
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import json
          import os
          import urllib.request

          repo = os.environ["GH_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          branch = "feature/power-entities-1181"
          paths = [
              "scripts/world/entity_contract_fixtures.gd",
              "scripts/world/entity_status_evaluator.gd",
              "scripts/world/entity_definition_contract.gd",
              "scripts/world/power_control_resolver.gd",
              "tools/ci/check_entity_contract_consistency.gd",
          ]

          def api(method, endpoint, payload=None):
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}{endpoint}",
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
                  data=None if payload is None else json.dumps(payload).encode("utf-8"),
              )
              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read().decode("utf-8"))

          ref = api("GET", f"/git/ref/heads/{branch}")
          parent_sha = ref["object"]["sha"]
          parent_commit = api("GET", f"/git/commits/{parent_sha}")
          entries = []
          for file_path in paths:
              content = base64.b64encode(Path(file_path).read_bytes()).decode("ascii")
              blob = api("POST", "/git/blobs", {"content": content, "encoding": "base64"})
              entries.append({"path": file_path, "mode": "100644", "type": "blob", "sha": blob["sha"]})
          tree = api("POST", "/git/trees", {"base_tree": parent_commit["tree"]["sha"], "tree": entries})
          commit = api("POST", "/git/commits", {
              "message": "feat(power): integrate stationary power semantic contracts",
              "tree": tree["sha"],
              "parents": [parent_sha],
          })
          api("PATCH", f"/git/refs/heads/{branch}", {"sha": commit["sha"], "force": False})
          print(commit["sha"])
          PY
