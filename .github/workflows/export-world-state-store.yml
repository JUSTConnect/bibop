name: Export WorldStateStore Source

on:
  pull_request:

jobs:
  export-world-state-store:
    if: github.event.pull_request.number == 1195
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: world-state-store-source
          path: scripts/world/world_state_store.gd
          if-no-files-found: error
