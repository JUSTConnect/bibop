name: Fix PR 1185 cable contract

on:
  push:
    branches:
      - codex/add-declarative-entity-definitions-and-completeness-gate
    paths:
      - .github/workflows/fix-pr-1185-cable-contract.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/add-declarative-entity-definitions-and-completeness-gate
          fetch-depth: 0

      - name: Correct canonical power cable metadata
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/world/world_object_catalog.gd")
          source = path.read_text(encoding="utf-8")
          old = '"entity_contract":{"scope":"entity", "entity_type":"cable", "entity_subtype":"power_cable", "status_profile":"cable_standard", "property_profile":"fixed", "interaction_profile":"cable", "notification_profile":"none", "power_profile":"configurable", "control_profile":"none", "access_profile":"none", "binding_profile":"standard", "runtime_presentation_profile":"standard_cable", "editor_presentation_profile":"standard_cable", "validation_fixture":"default", "capabilities":{"state":true, "power":true, "health":true, "energy":false, "overheat":false, "control":false, "access":false, "bindings":false, "mount":true, "side":true, "routing":true, "test_override":true}}'
          new = '"entity_contract":{"scope":"entity", "entity_type":"cable", "entity_subtype":"power_cable", "status_profile":"cable_standard", "property_profile":"fixed", "interaction_profile":"cable", "notification_profile":"none", "power_profile":"none", "control_profile":"none", "access_profile":"none", "binding_profile":"standard", "runtime_presentation_profile":"standard_cable", "editor_presentation_profile":"standard_cable", "validation_fixture":"default", "capabilities":{"state":true, "power":false, "health":false, "energy":false, "overheat":false, "control":false, "access":false, "bindings":true, "mount":true, "side":false, "routing":true, "test_override":true}}'
          if source.count(old) != 1:
              raise SystemExit(f"expected one canonical power_cable contract, found {source.count(old)}")
          path.write_text(source.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Remove one-shot workflow and push fix
        shell: bash
        run: |
          git config user.name "Bipob Assistant"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-pr-1185-cable-contract.yml
          git add scripts/world/world_object_catalog.gd
          git commit -m "Correct canonical power cable entity contract"
          git push origin HEAD:codex/add-declarative-entity-definitions-and-completeness-gate
