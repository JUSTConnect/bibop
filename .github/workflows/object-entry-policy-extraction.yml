name: Apply Object Entry Policy Extraction

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02d-object-entry-policy
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply extraction
        run: python tools/apply_object_entry_policy_extraction.py
      - name: Commit generated change
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/visual/renderer/object_renderer.gd scripts/field/room_visual_renderer.gd tools/ci/check_object_renderer_contract.gd tools/check_room_visual_renderer_component_boundary.py
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Extract object draw-entry policy [bot]'
          git push origin HEAD:codex/bip-architecture-coordinators-02d-object-entry-policy
