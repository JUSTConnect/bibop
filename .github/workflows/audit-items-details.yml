name: Audit Items and Details

on:
  pull_request:

jobs:
  audit-items-details:
    if: github.event.pull_request.number == 1197
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect inventory and reward paths
        run: |
          {
            echo '## amount and item_amounts'
            grep -RIn --exclude-dir=.git -E 'item_amounts|"amount"|\.get\("amount"|parts_small|parts_medium|parts_large' scripts tools docs || true
            echo '## inventory method declarations'
            grep -nE '^func (get_inventory_state|apply_inventory_state|pickup_world_item|drop_inventory_item|consume_|use_|route_runtime_item|can_route_runtime_item|add_item_at_cell|remove_item|_get_world_item_runtime_map|_build_picked_up_world_item_runtime)' scripts/game/mission_manager.gd || true
            echo '## inventory mutation lines'
            grep -nE 'runtime_inventory_state\[|world_item_runtime|consumed_item_ids|item_amounts' scripts/game/mission_manager.gd || true
            echo '## center storage and reward candidates'
            grep -RIn --exclude-dir=.git -E 'CenterStorageService|collect_mission_return|reward_id|reward|currency|details_balance|RESOURCE_KIND_PARTS|STORAGE_PARTS' scripts/game scripts/world scripts/bipob || true
            echo '## source context around pickup functions'
            for line in $(grep -nE '^func (pickup_world_item|drop_inventory_item|get_inventory_state|apply_inventory_state)' scripts/game/mission_manager.gd | cut -d: -f1); do
              start=$((line-8)); if [ "$start" -lt 1 ]; then start=1; fi
              end=$((line+90))
              echo "--- mission_manager.gd:${start}-${end} ---"
              sed -n "${start},${end}p" scripts/game/mission_manager.gd
            done
          } > /tmp/items-details-audit.txt
      - uses: actions/upload-artifact@v4
        with:
          name: items-details-audit-expanded
          path: /tmp/items-details-audit.txt
          if-no-files-found: error
