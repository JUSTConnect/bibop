name: Branch Maintenance 1223

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/branch-maintenance-1223.yml

permissions:
  contents: write

jobs:
  remove-temporary-files:
    if: github.event.pull_request.number == 1223
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/runtime-properties-final-1178
          fetch-depth: 0
      - name: Remove temporary workflows
        shell: bash
        run: |
          rm -f .github/workflows/patch-1223-canonical-entry-v2.yml
          rm -f .github/workflows/branch-maintenance-1223.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .github/workflows
          git commit -m "ci: remove temporary inspector patch workflows"
          git push origin HEAD:feature/runtime-properties-final-1178
