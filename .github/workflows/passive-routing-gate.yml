name: Passive Routing Gate

on:
  pull_request:

jobs:
  passive-routing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - run: godot --headless --path . --import
      - run: godot --headless --path . --script res://tools/ci/check_passive_route_service.gd
