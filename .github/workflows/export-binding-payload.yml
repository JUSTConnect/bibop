name: Export BindingStore Payload

on:
  pull_request:

jobs:
  export-binding-payload:
    if: github.event.pull_request.number == 1195
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: binding-store-payload-debug
          path: .github/binding-store-payload
          if-no-files-found: error
