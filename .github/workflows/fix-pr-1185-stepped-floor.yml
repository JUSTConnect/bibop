name: Fix PR 1185 stepped floor path

on:
  push:
    branches:
      - codex/add-declarative-entity-definitions-and-completeness-gate
    paths:
      - .github/workflows/fix-pr-1185-stepped-floor.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/add-declarative-entity-definitions-and-completeness-gate
          fetch-depth: 0

      - name: Move stepped floor before generic placement validation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/game/map_constructor_service.gd")
          source = path.read_text(encoding="utf-8")

          old = '''func place_map_constructor_prefab(prefab_id: String, cell: Vector2i, preferred_wall_side: String = "", rotation_degrees: int = 0, placement_mode_override: String = "") -> Dictionary:\n\tif not manager._is_task_test_constructor_context():\n\t\treturn {"ok": false, "message": "Operation is available only in TASK TEST constructor mode."}\n\tif prefab_id != "stepped_floor":\n\t\tvar contract_report: Dictionary = WorldObjectCatalogRef.validate_entity_definition_contract(prefab_id)\n\t\tif not bool(contract_report.get("valid", false)):\n\t\t\treturn {"ok": false, "reason": "incomplete_entity_contract", "message": "Entity definition is incomplete.", "prefab_id": prefab_id, "contract_errors": Array(contract_report.get("errors", [])), "object_id": "", "warnings": []}\n\tvar check: Dictionary = manager.can_place_map_constructor_prefab(prefab_id, cell, preferred_wall_side, placement_mode_override)\n'''

          new = '''func place_map_constructor_prefab(prefab_id: String, cell: Vector2i, preferred_wall_side: String = "", rotation_degrees: int = 0, placement_mode_override: String = "") -> Dictionary:\n\tif not manager._is_task_test_constructor_context():\n\t\treturn {"ok": false, "message": "Operation is available only in TASK TEST constructor mode."}\n\tif prefab_id == "stepped_floor":\n\t\tif manager.grid_manager == null or not manager.grid_manager.has_method("set_tile"):\n\t\t\treturn {"ok": false, "reason": "missing_grid_manager", "message": "Grid manager is unavailable.", "object_id": "", "warnings": []}\n\t\tif manager.has_method("_is_valid_grid_cell") and not manager._is_valid_grid_cell(cell):\n\t\t\treturn {"ok": false, "reason": "out_of_bounds", "message": "Cell is outside the constructor grid.", "object_id": "", "warnings": []}\n\t\tmanager.grid_manager.call("set_tile", cell, GridManager.TILE_STEPPED_FLOOR)\n\t\tmanager._record_map_constructor_change("place", {"entity_kind":"tile", "object_type":"stepped_floor", "cell":cell, "summary":"Placed stepped_floor at %s" % manager._format_map_constructor_cell(cell), "undo_hint":"Use constructor cleanup/reset tools if needed."})\n\t\treturn {"ok": true, "message": "Placed stepped_floor.", "object_id": "", "warnings": []}\n\tvar contract_report: Dictionary = WorldObjectCatalogRef.validate_entity_definition_contract(prefab_id)\n\tif not bool(contract_report.get("valid", false)):\n\t\treturn {"ok": false, "reason": "incomplete_entity_contract", "message": "Entity definition is incomplete.", "prefab_id": prefab_id, "contract_errors": Array(contract_report.get("errors", [])), "object_id": "", "warnings": []}\n\tvar check: Dictionary = manager.can_place_map_constructor_prefab(prefab_id, cell, preferred_wall_side, placement_mode_override)\n'''

          if source.count(old) != 1:
              raise SystemExit(f"expected one placement header, found {source.count(old)}")
          source = source.replace(old, new, 1)

          old_late = '''\tif prefab_id == "stepped_floor":\n\t\tmanager.grid_manager.call("set_tile", cell, GridManager.TILE_STEPPED_FLOOR)\n\t\tmanager._record_map_constructor_change("place", {"entity_kind":"tile", "object_type":"stepped_floor", "cell":cell, "summary":"Placed stepped_floor at %s" % manager._format_map_constructor_cell(cell), "undo_hint":"Use constructor cleanup/reset tools if needed."})\n\t\treturn result\n'''
          if source.count(old_late) != 1:
              raise SystemExit(f"expected one late stepped-floor branch, found {source.count(old_late)}")
          source = source.replace(old_late, "", 1)

          path.write_text(source, encoding="utf-8")
          PY

      - name: Remove one-shot workflow and push fix
        shell: bash
        run: |
          git config user.name "Bipob Assistant"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-pr-1185-stepped-floor.yml
          git add scripts/game/map_constructor_service.gd
          git commit -m "Fix stepped floor placement before contract validation"
          git push origin HEAD:codex/add-declarative-entity-definitions-and-completeness-gate
