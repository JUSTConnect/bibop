name: Retire Movable Cleanup

on:
  pull_request:

permissions:
  contents: write

jobs:
  retire:
    if: github.event.pull_request.number == 1198
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Remove retired workflow
        run: |
          rm -f .github/workflows/cleanup-movable-legacy.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u .github/workflows/cleanup-movable-legacy.yml
          git commit -m "Remove retired movable cleanup workflow"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
