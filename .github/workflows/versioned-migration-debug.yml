name: Versioned Migration Debug

on:
  pull_request:

jobs:
  debug-versioned-migration:
    if: github.event.pull_request.number == 1202
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - run: godot --headless --path . --import
      - name: Capture migration log
        run: |
          mkdir -p /tmp/versioned-migration-debug
          set +e
          timeout 120s godot --headless --path . --script res://tools/ci/check_versioned_snapshot_migration.gd > /tmp/versioned-migration-debug/output.log 2>&1
          echo $? > /tmp/versioned-migration-debug/exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: versioned-migration-debug
          path: /tmp/versioned-migration-debug
          if-no-files-found: error
