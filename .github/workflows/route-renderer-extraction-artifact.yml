name: RouteRenderer Extraction Artifact

on:
  pull_request:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply extraction locally
        run: python tools/apply_route_renderer_extraction.py
      - name: Upload transformed files
        uses: actions/upload-artifact@v4
        with:
          name: route-renderer-transformed-files
          path: |
            scripts/field/room_visual_renderer.gd
            tools/check_room_visual_renderer_component_boundary.py
            .github/workflows/renderer-component-gate.yml
