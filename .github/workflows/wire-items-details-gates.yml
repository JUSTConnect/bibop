name: Wire Items Details Gates

on:
  pull_request:

permissions:
  contents: write

jobs:
  wire-items-details-gates:
    if: github.event.pull_request.number == 1197
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch parser workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/godot-parser-gate.yml')
          text = path.read_text()
          static_marker = '          python tools/check_power_cable_reel.py\n'
          static_line = '          python tools/check_normal_items_details.py\n'
          if static_line not in text:
              if text.count(static_marker) != 1:
                  raise SystemExit('static marker missing')
              text = text.replace(static_marker, static_marker + static_line, 1)
          runtime_marker = '          godot --headless --path . --script res://tools/ci/check_power_cable_reel_mission_manager.gd\n'
          runtime_lines = '          godot --headless --path . --script res://tools/ci/check_normal_items_details.gd\n          godot --headless --path . --script res://tools/ci/check_normal_items_details_mission_manager.gd\n'
          if 'check_normal_items_details.gd' not in text:
              if text.count(runtime_marker) != 1:
                  raise SystemExit('runtime marker missing')
              text = text.replace(runtime_marker, runtime_marker + runtime_lines, 1)
          path.write_text(text)
          PY
      - name: Commit gates and remove temporary workflows
        run: |
          rm -f .github/workflows/audit-items-details.yml
          rm -f .github/workflows/wire-items-details-gates.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/godot-parser-gate.yml .github/workflows/audit-items-details.yml .github/workflows/wire-items-details-gates.yml
          git commit -m "Run normal items and Details regression gates"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
