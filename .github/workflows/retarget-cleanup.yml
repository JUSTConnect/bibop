name: Retarget Cleanup
on: pull_request
permissions:
  contents: write
jobs:
  retarget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/finalize-canonical-runtime
      - run: |
          python3 -c "from pathlib import Path; p=Path('.github/workflows/apply-canonical-store-reel.yml'); p.write_text(p.read_text().replace('number == 1204','number == 1203'))"
          git config user.name github-actions
          git config user.email actions@github.com
          git add .github/workflows/apply-canonical-store-reel.yml
          git commit -m 'Retarget cleanup workflow'
          git push
