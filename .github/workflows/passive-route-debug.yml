name: Passive Route Debug

on:
  pull_request:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - run: godot --headless --path . --import
      - name: Capture logs
        run: |
          mkdir -p /tmp/route-debug
          set +e
          timeout 60s godot --headless --path . --script res://tools/ci/check_entity_definition_contracts.gd > /tmp/route-debug/entity.log 2>&1
          echo $? > /tmp/route-debug/entity.exit
          timeout 60s godot --headless --path . --script res://tools/ci/check_passive_route_integration.gd > /tmp/route-debug/integration.log 2>&1
          echo $? > /tmp/route-debug/integration.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: passive-route-debug
          path: /tmp/route-debug
          if-no-files-found: error
