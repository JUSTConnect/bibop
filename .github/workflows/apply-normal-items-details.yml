name: Apply Normal Items and Details

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-normal-items-details:
    if: github.event.pull_request.number == 1197
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch MissionManager and world catalog
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one marker, found {count}')
              return text.replace(old, new, 1)

          mission_path = Path('scripts/game/mission_manager.gd')
          mission = mission_path.read_text()
          mission = replace_once(
              mission,
              'const BipobCableRuntimeServiceRef = preload("res://scripts/game/bipob_cable_runtime_service.gd")\n',
              'const BipobCableRuntimeServiceRef = preload("res://scripts/game/bipob_cable_runtime_service.gd")\nconst DetailsCurrencyServiceRef = preload("res://scripts/game/inventory/details_currency_service.gd")\nconst NormalItemContractRef = preload("res://scripts/game/inventory/normal_item_contract.gd")\n',
              'inventory service preloads'
          )
          mission = replace_once(
              mission,
              'var generic_cable_runtime_report: Dictionary = {}\nvar generic_airflow_runtime_report: Dictionary = {}\n',
              'var generic_cable_runtime_report: Dictionary = {}\nvar generic_airflow_runtime_report: Dictionary = {}\nvar details_currency_service = DetailsCurrencyServiceRef.new()\n',
              'currency owner'
          )
          mission = replace_once(
              mission,
              '\t"box_storage": [],\n\t"item_amounts": {},\n\t"consumed_item_ids": [],\n',
              '\t"box_storage": [],\n\t"consumed_item_ids": [],\n',
              'legacy item amounts field'
          )
          old_replace = '''func replace_world_state_serialized_snapshot(snapshot: Dictionary) -> Dictionary:
          \tvar raw_entities: Variant = snapshot.get("entities", snapshot.get("objects", []))
          \tif not (raw_entities is Array):
          \t\treturn {"ok": false, "success": false, "code": "missing", "reason_code": "missing", "details": {"field": "entities"}}
          \tvar entities: Array[Dictionary] = []
          \tfor entity_value in Array(raw_entities):
          \t\tif not (entity_value is Dictionary):
          \t\t\treturn {"ok": false, "success": false, "code": "missing", "reason_code": "missing", "details": {"field": "entities", "reason": "entity_not_dictionary"}}
          \t\tentities.append(Dictionary(entity_value))
          \tvar bounds_check: Dictionary = _validate_world_state_store_snapshot_bounds(entities)
          \tif not bool(bounds_check.get("ok", false)):
          \t\treturn bounds_check
          \treturn world_state_store.replace_serialized_snapshot(snapshot)

          func get_world_state_serializable_snapshot() -> Dictionary:
          \treturn world_state_store.get_serializable_snapshot()
          '''
          new_replace = '''func replace_world_state_serialized_snapshot(snapshot: Dictionary) -> Dictionary:
          \tvar raw_entities: Variant = snapshot.get("entities", snapshot.get("objects", []))
          \tif not (raw_entities is Array):
          \t\treturn {"ok": false, "success": false, "code": "missing", "reason_code": "missing", "details": {"field": "entities"}}
          \tvar entities: Array[Dictionary] = []
          \tfor entity_value in Array(raw_entities):
          \t\tif not (entity_value is Dictionary):
          \t\t\treturn {"ok": false, "success": false, "code": "missing", "reason_code": "missing", "details": {"field": "entities", "reason": "entity_not_dictionary"}}
          \t\tentities.append(Dictionary(entity_value))
          \tvar details_snapshot: Variant = snapshot.get("details_currency", {})
          \tif details_snapshot is Dictionary and not Dictionary(details_snapshot).is_empty():
          \t\tvar preview_service = DetailsCurrencyServiceRef.new()
          \t\tvar details_validation: Dictionary = preview_service.replace_snapshot(Dictionary(details_snapshot))
          \t\tif not bool(details_validation.get("success", false)):
          \t\t\treturn details_validation
          \tvar bounds_check: Dictionary = _validate_world_state_store_snapshot_bounds(entities)
          \tif not bool(bounds_check.get("ok", false)):
          \t\treturn bounds_check
          \tvar world_result: Dictionary = world_state_store.replace_serialized_snapshot(snapshot)
          \tif not bool(world_result.get("ok", false)):
          \t\treturn world_result
          \tif details_snapshot is Dictionary and not Dictionary(details_snapshot).is_empty():
          \t\tdetails_currency_service.replace_snapshot(Dictionary(details_snapshot))
          \treturn world_result

          func get_world_state_serializable_snapshot() -> Dictionary:
          \tvar snapshot: Dictionary = world_state_store.get_serializable_snapshot()
          \tsnapshot["details_currency"] = details_currency_service.get_snapshot()
          \treturn snapshot
          '''
          mission = replace_once(mission, old_replace, new_replace, 'serialized Details snapshot')
          normalize_marker = '''func _normalize_runtime_route_item_data(item_variant: Variant) -> Dictionary:
          \tvar item_data: Dictionary = Dictionary(item_variant).duplicate(true) if item_variant is Dictionary else {}
          \tvar item_id: String = str(item_variant).strip_edges() if item_variant is String or item_variant is StringName else str(item_data.get("id", item_data.get("item_id", ""))).strip_edges()
          \tif item_data.is_empty() and not item_id.is_empty():
          \t\titem_data = _get_known_inventory_item_data(item_id)
          \tif item_data.is_empty():
          \t\titem_data = {"id": item_id, "item_type": item_id}
          \tvar item_type: String = str(item_data.get("item_type", item_data.get("object_type", item_data.get("id", "")))).strip_edges()
          '''
          normalize_replacement = '''func _normalize_runtime_route_item_data(item_variant: Variant) -> Dictionary:
          \tvar item_data: Dictionary = Dictionary(item_variant).duplicate(true) if item_variant is Dictionary else {}
          \tvar item_id: String = str(item_variant).strip_edges() if item_variant is String or item_variant is StringName else str(item_data.get("id", item_data.get("item_id", ""))).strip_edges()
          \tif item_data.is_empty() and not item_id.is_empty():
          \t\titem_data = _get_known_inventory_item_data(item_id)
          \tif item_data.is_empty():
          \t\titem_data = {"id": item_id, "item_type": item_id}
          \tif DetailsCurrencyServiceRef.is_details_entry(item_data, item_id):
          \t\tif item_id.is_empty():
          \t\t\titem_id = _allocate_runtime_inventory_item_id("details")
          \t\titem_data["id"] = item_id
          \t\treturn DetailsCurrencyServiceRef.make_details_pickup(item_data)
          \tvar item_type: String = str(item_data.get("item_type", item_data.get("object_type", item_data.get("id", "")))).strip_edges()
          '''
          mission = replace_once(mission, normalize_marker, normalize_replacement, 'route item normalization')
          mission = replace_once(
              mission,
              '\titem_data["id"] = normalized_id\n\treturn item_data\n\nfunc can_route_runtime_item',
              '\titem_data["id"] = normalized_id\n\treturn NormalItemContractRef.canonicalize(item_data)\n\nfunc can_route_runtime_item',
              'normal item canonicalization'
          )
          can_route_marker = '''\tvar item_id: String = _get_runtime_inventory_item_id(item_data)
          \tvar classification: String = classify_runtime_item(item_data)
          \tvar target: String = preferred_target.strip_edges().to_lower()
          '''
          can_route_replacement = '''\tvar item_id: String = _get_runtime_inventory_item_id(item_data)
          \tif DetailsCurrencyServiceRef.is_details_entry(item_data, item_id):
          \t\treturn {"success": true, "ok": true, "code": "received", "reason_code": "received", "item_id": item_id, "storage": "details_balance", "slot_index": -1, "amount": DetailsCurrencyServiceRef.get_entry_amount(item_data), "message": "Details collected.", "reasons": ["ok"]}
          \tvar classification: String = classify_runtime_item(item_data)
          \tvar target: String = preferred_target.strip_edges().to_lower()
          '''
          mission = replace_once(mission, can_route_marker, can_route_replacement, 'Details route gate')
          route_marker = '''\tvar item_id: String = str(gate.get("item_id", _get_runtime_inventory_item_id(item_data))).strip_edges()
          \titem_data["id"] = item_id
          \tvar runtime_map: Dictionary = _get_world_item_runtime_map()
          '''
          route_replacement = '''\tvar item_id: String = str(gate.get("item_id", _get_runtime_inventory_item_id(item_data))).strip_edges()
          \titem_data["id"] = item_id
          \tif DetailsCurrencyServiceRef.is_details_entry(item_data, item_id):
          \t\tvar reward_id: String = "world_pickup:%s" % item_id
          \t\tvar currency_result: Dictionary = details_currency_service.receive(DetailsCurrencyServiceRef.get_entry_amount(item_data), reward_id, "world_pickup")
          \t\treturn {"success": bool(currency_result.get("success", false)), "ok": bool(currency_result.get("success", false)), "code": str(currency_result.get("code", "")), "reason_code": str(currency_result.get("reason_code", "")), "item_id": item_id, "storage": "details_balance", "slot_index": -1, "amount": int(currency_result.get("amount", 0)), "message": "Details collected.", "reasons": ["ok"], "item_data": item_data.duplicate(true), "currency_result": currency_result, "notification_event": Dictionary(currency_result.get("notification_event", {})).duplicate(true)}
          \tvar runtime_map: Dictionary = _get_world_item_runtime_map()
          '''
          mission = replace_once(mission, route_marker, route_replacement, 'Details route mutation')
          inventory_marker = '''func get_inventory_state() -> Dictionary:
          \tvar snapshot: Dictionary = runtime_inventory_state.duplicate(true)
          \tsnapshot["manipulator_hold"] = get_manipulator_item_id()
          \tsnapshot["pocket_items"] = get_pocket_items()
          \tsnapshot["collected_key_ids"] = get_keychain_ids()
          \tsnapshot["acquired_access_codes"] = Array(runtime_inventory_state.get("acquired_access_codes", [])).duplicate()
          \tsnapshot["acquired_digital_key_ids"] = Array(runtime_inventory_state.get("acquired_digital_key_ids", [])).duplicate()
          \tsnapshot["acquired_data_file_ids"] = Array(runtime_inventory_state.get("acquired_data_file_ids", [])).duplicate()
          \tsnapshot["digital_buffer"] = get_digital_buffer_items()
          \tsnapshot["digital_storage"] = get_digital_storage_items()
          \treturn snapshot
          '''
          inventory_replacement = inventory_marker.replace('\treturn snapshot\n', '\tsnapshot.erase("item_amounts")\n\treturn snapshot\n') + '''
          func get_details_balance() -> int:
          \treturn details_currency_service.get_balance()

          func get_details_currency_snapshot() -> Dictionary:
          \treturn details_currency_service.get_snapshot()

          func replace_details_currency_snapshot(snapshot: Dictionary) -> Dictionary:
          \treturn details_currency_service.replace_snapshot(snapshot)

          func preview_receive_details(amount: int, reward_id: String, source: String = "") -> Dictionary:
          \treturn details_currency_service.preview_receive(amount, reward_id, source)

          func receive_details_reward(reward_id: String, amount: int, source: String = "reward") -> Dictionary:
          \treturn details_currency_service.receive(amount, reward_id, source)

          func preview_spend_details(amount: int, transaction_id: String = "", source: String = "") -> Dictionary:
          \treturn details_currency_service.preview_spend(amount, transaction_id, source)

          func spend_details(amount: int, transaction_id: String = "", source: String = "") -> Dictionary:
          \treturn details_currency_service.spend(amount, transaction_id, source)

          func migrate_legacy_parts_state(center_storage: Dictionary = {}, migration_id: String = "legacy_parts_v1") -> Dictionary:
          \tvar migration: Dictionary = details_currency_service.migrate_legacy_parts(runtime_inventory_state, center_storage, migration_id)
          \tif not bool(migration.get("success", false)):
          \t\treturn migration
          \truntime_inventory_state = Dictionary(migration.get("inventory_state", {})).duplicate(true)
          \tvar migrated_objects: Array[Dictionary] = DetailsCurrencyServiceRef.migrate_world_pickups(world_state_store.get_all_objects())
          \tfor object_data in migrated_objects:
          \t\tvar object_id: String = str(object_data.get("id", "")).strip_edges()
          \t\tif object_id.is_empty():
          \t\t\tcontinue
          \t\tvar current: Dictionary = world_state_store.get_object_by_id(object_id)
          \t\tif str(current.get("object_type", "")) != str(object_data.get("object_type", "")) or str(current.get("item_type", "")) != str(object_data.get("item_type", "")):
          \t\t\t_upsert_world_state_object(object_data)
          \treturn migration
          '''
          mission = replace_once(mission, inventory_marker, inventory_replacement, 'Details API')
          pickup_return = '''\treturn {"success": true, "reasons": ["ok"], "message": message, "item_id": normalized_id, "storage": str(route_result.get("storage", "")), "slot_index": int(route_result.get("slot_index", -1)), "item_data": Dictionary(route_result.get("item_data", item))}
          '''
          pickup_replacement = '''\treturn {"success": true, "ok": true, "code": str(route_result.get("code", "valid")), "reason_code": str(route_result.get("reason_code", route_result.get("code", "valid"))), "reasons": ["ok"], "message": message, "item_id": normalized_id, "storage": str(route_result.get("storage", "")), "slot_index": int(route_result.get("slot_index", -1)), "item_data": Dictionary(route_result.get("item_data", item)), "notification_event": Dictionary(route_result.get("notification_event", {})).duplicate(true)}
          '''
          mission = replace_once(mission, pickup_return, pickup_replacement, 'pickup action result')
          mission = replace_once(
              mission,
              '''\tvar item := get_world_object_by_id(item_id)
          \tvar target := get_world_object_by_id(target_id)
          \tif item.is_empty():
          \t\tout["reasons"] = ["item_missing"]
          \t\treturn out
          ''',
              '''\tvar item := get_world_object_by_id(item_id)
          \tif item.is_empty():
          \t\titem = _get_runtime_item_data_snapshot(item_id)
          \tvar target := get_world_object_by_id(target_id)
          \tif item.is_empty():
          \t\tout["reasons"] = ["item_missing"]
          \t\treturn out
          ''',
              'inventory item lookup'
          )
          mission = replace_once(
              mission,
              '\tout["target_state_after"] = str(target.get("state", before))\n\treturn out\n\nfunc get_door_debug_report_text',
              '''\tout["target_state_after"] = str(target.get("state", before))
          \tif bool(out.get("success", false)) and bool(out.get("consumed", false)):
          \t\tvar consumption: Dictionary = NormalItemContractRef.apply_consumption(runtime_inventory_state, item_id, item, out)
          \t\tif bool(consumption.get("success", false)):
          \t\t\truntime_inventory_state = Dictionary(consumption.get("inventory", {})).duplicate(true)
          \t\t\tout["consumption_code"] = str(consumption.get("code", ""))
          \treturn out

          func get_door_debug_report_text''',
              'consume after success'
          )
          mission = mission.replace('for field_name in ["pocket_items", "manipulator_hold", "digital_buffer", "item_amounts", "consumed_item_ids", "world_item_runtime"]:', 'for field_name in ["pocket_items", "manipulator_hold", "digital_buffer", "consumed_item_ids", "world_item_runtime"]:')
          mission_path.write_text(mission)

          catalog_path = Path('scripts/world/world_object_catalog.gd')
          catalog = catalog_path.read_text()
          for legacy_id in ['parts', 'parts_small', 'parts_medium', 'parts_large']:
              catalog = catalog.replace(f'\t"{legacy_id}": "physical_item",', f'\t"{legacy_id}": "details_pickup",')
          defaults_old = '''\t"parts": {"physical_item_type":"parts", "item_type":"parts", "visual_asset_id":"parts_floor_01", "amount":1},
          \t"parts_small": {"physical_item_type":"parts", "item_type":"parts", "visual_asset_id":"parts_floor_01", "amount":5},
          \t"parts_medium": {"physical_item_type":"parts", "item_type":"parts", "visual_asset_id":"parts_floor_01", "amount":10},
          \t"parts_large": {"physical_item_type":"parts", "item_type":"parts", "visual_asset_id":"parts_floor_01", "amount":20},
          '''
          defaults_new = '''\t"parts": {"currency_id":"details", "item_type":"details", "object_type":"details_pickup", "visual_asset_id":"parts_floor_01", "amount":1},
          \t"parts_small": {"currency_id":"details", "item_type":"details", "object_type":"details_pickup", "visual_asset_id":"parts_floor_01", "amount":5},
          \t"parts_medium": {"currency_id":"details", "item_type":"details", "object_type":"details_pickup", "visual_asset_id":"parts_floor_01", "amount":10},
          \t"parts_large": {"currency_id":"details", "item_type":"details", "object_type":"details_pickup", "visual_asset_id":"parts_floor_01", "amount":20},
          '''
          catalog = replace_once(catalog, defaults_old, defaults_new, 'parts alias defaults')
          physical_old = '''\t"physical_item": {
          \t\t"entity_contract":{"scope":"entity", "entity_type":"item", "entity_subtype":"physical_item", "status_profile":"item_standard", "property_profile":"definition_schema", "interaction_profile":"item", "notification_profile":"standard_action", "power_profile":"none", "control_profile":"none", "access_profile":"none", "binding_profile":"standard", "runtime_presentation_profile":"standard_item", "editor_presentation_profile":"standard_item", "validation_fixture":"default", "capabilities":{"state":true, "power":false, "health":false, "energy":false, "overheat":false, "control":false, "access":false, "bindings":true, "mount":true, "side":false, "routing":false, "test_override":true}},
          \t\t"archetype_id":"physical_item", "object_group":"item", "object_type":"item", "palette_label":"Physical Items", "placement_mode":"item", "placement_surfaces":["floor"], "default_placement_surface":"floor", "requires_floor_anchor_when_wall_mounted":false, "display_name_template":"{physical_item_type_label}", "configurable":true, "can_pickup":true, "interactable":true, "item_category":"physical", "item_form":"physical", "storage_route":"pocket", "storage_type":"pocket", "physical_item_type":"parts", "item_class":"physical_item", "item_type":"parts", "visual_asset_id":"parts_floor_01", "visual_family":"parts", "visual_surface":"floor", "state":"available", "allowed_states":["available", "collected", "disabled"],
          \t\t"property_schema":[{"field":"physical_item_type", "type":"enum", "values":["fuse", "reinforcement", "repair_kit", "parts"], "default":"parts", "labels":{"fuse":"Fuse", "reinforcement":"Reinforcement Kit", "repair_kit":"Repair Kit", "parts":"Parts"}}, {"field":"state", "type":"enum", "values":["available", "collected", "disabled"], "default":"available"}, {"field":"amount", "type":"int", "default":1, "min":1}]
          \t},
          '''
          physical_new = '''\t"physical_item": {
          \t\t"entity_contract":{"scope":"entity", "entity_type":"item", "entity_subtype":"physical_item", "status_profile":"item_standard", "property_profile":"definition_schema", "interaction_profile":"item", "notification_profile":"standard_action", "power_profile":"none", "control_profile":"none", "access_profile":"none", "binding_profile":"standard", "runtime_presentation_profile":"standard_item", "editor_presentation_profile":"standard_item", "validation_fixture":"default", "capabilities":{"state":true, "power":false, "health":false, "energy":false, "overheat":false, "control":false, "access":false, "bindings":true, "mount":true, "side":false, "routing":false, "test_override":true}},
          \t\t"archetype_id":"physical_item", "object_group":"item", "object_type":"item", "palette_label":"Physical Items", "placement_mode":"item", "placement_surfaces":["floor"], "default_placement_surface":"floor", "requires_floor_anchor_when_wall_mounted":false, "display_name_template":"{physical_item_type_label}", "configurable":true, "can_pickup":true, "interactable":true, "item_category":"physical", "item_form":"physical", "storage_route":"pocket", "storage_type":"pocket", "physical_item_type":"fuse", "item_class":"physical_item", "item_type":"fuse", "visual_asset_id":"fuse_floor_01", "visual_family":"fuse", "visual_surface":"floor", "state":"available", "allowed_states":["available", "collected", "disabled"], "stackable":false,
          \t\t"property_schema":[{"field":"physical_item_type", "type":"enum", "values":["fuse", "reinforcement", "repair_kit"], "default":"fuse", "labels":{"fuse":"Fuse", "reinforcement":"Reinforcement Kit", "repair_kit":"Repair Kit"}}, {"field":"state", "type":"enum", "values":["available", "collected", "disabled"], "default":"available"}]
          \t},
          \t"details_pickup": {
          \t\t"entity_contract":{"scope":"entity", "entity_type":"item", "entity_subtype":"details_pickup", "status_profile":"item_standard", "property_profile":"definition_schema", "interaction_profile":"item", "notification_profile":"standard_action", "power_profile":"none", "control_profile":"none", "access_profile":"none", "binding_profile":"none", "runtime_presentation_profile":"standard_item", "editor_presentation_profile":"standard_item", "validation_fixture":"default", "capabilities":{"state":true, "power":false, "health":false, "energy":false, "overheat":false, "control":false, "access":false, "bindings":false, "mount":true, "side":false, "routing":false, "test_override":true}},
          \t\t"archetype_id":"details_pickup", "object_group":"item", "object_type":"details_pickup", "palette_label":"Details", "placement_mode":"item", "placement_surfaces":["floor"], "default_placement_surface":"floor", "requires_floor_anchor_when_wall_mounted":false, "display_name_template":"Детали", "configurable":true, "can_pickup":true, "interactable":true, "item_category":"currency_pickup", "item_form":"currency_pickup", "storage_route":"none", "storage_type":"none", "currency_id":"details", "item_type":"details", "visual_asset_id":"parts_floor_01", "visual_family":"parts", "visual_surface":"floor", "state":"available", "allowed_states":["available", "collected", "disabled"], "amount":1, "stackable":false,
          \t\t"property_schema":[{"field":"amount", "type":"int", "default":1, "min":1}, {"field":"state", "type":"enum", "values":["available", "collected", "disabled"], "default":"available"}]
          \t},
          '''
          catalog = replace_once(catalog, physical_old, physical_new, 'normal and Details archetypes')
          runtime_old = '''\t"parts": {"group":"item","name":"Parts","visual_asset_id":"parts_floor_01","item_form":"physical","storage_type":"pocket","can_pickup":true,"can_place_in_digital_buffer":false,"consumable":false,"fits_targets":[]},
          \t"parts_small": {"group":"item","name":"Parts (Small)","visual_asset_id":"parts_floor_01","item_form":"physical","storage_type":"pocket","can_pickup":true,"amount":5,"can_place_in_digital_buffer":false,"consumable":false,"fits_targets":[]},
          \t"parts_medium": {"group":"item","name":"Parts (Medium)","visual_asset_id":"parts_floor_01","item_form":"physical","storage_type":"pocket","can_pickup":true,"amount":10,"can_place_in_digital_buffer":false,"consumable":false,"fits_targets":[]},
          \t"parts_large": {"group":"item","name":"Parts (Large)","visual_asset_id":"parts_floor_01","item_form":"physical","storage_type":"pocket","can_pickup":true,"amount":20,"can_place_in_digital_buffer":false,"consumable":false,"fits_targets":[]},
          '''
          runtime_new = '''\t"parts": {"group":"item","object_group":"item","object_type":"details_pickup","name":"Детали","currency_id":"details","item_type":"details","visual_asset_id":"parts_floor_01","item_form":"currency_pickup","storage_type":"none","can_pickup":true,"amount":1,"stackable":false},
          \t"parts_small": {"group":"item","object_group":"item","object_type":"details_pickup","name":"Детали","currency_id":"details","item_type":"details","visual_asset_id":"parts_floor_01","item_form":"currency_pickup","storage_type":"none","can_pickup":true,"amount":5,"stackable":false},
          \t"parts_medium": {"group":"item","object_group":"item","object_type":"details_pickup","name":"Детали","currency_id":"details","item_type":"details","visual_asset_id":"parts_floor_01","item_form":"currency_pickup","storage_type":"none","can_pickup":true,"amount":10,"stackable":false},
          \t"parts_large": {"group":"item","object_group":"item","object_type":"details_pickup","name":"Детали","currency_id":"details","item_type":"details","visual_asset_id":"parts_floor_01","item_form":"currency_pickup","storage_type":"none","can_pickup":true,"amount":20,"stackable":false},
          '''
          catalog = replace_once(catalog, runtime_old, runtime_new, 'runtime Details definitions')
          physical_branch = '''\telif archetype_token == "physical_item" or data.has("physical_item_type") or source_type in ["fuse", "reinforcement", "repair_kit", "parts"]:
          \t\tvar physical_item_type: String = _normalized_contract_token(data.get("physical_item_type", data.get("item_type", "parts")))
          \t\tif not physical_item_type in ["fuse", "reinforcement", "repair_kit", "parts"]:
          \t\t\tphysical_item_type = "parts"
          '''
          details_and_physical = '''\telif archetype_token == "details_pickup" or source_type in ["parts", "parts_small", "parts_medium", "parts_large", "details"] or str(data.get("currency_id", "")) == "details":
          \t\tdata["archetype_id"] = "details_pickup"
          \t\tdata["item_category"] = "currency_pickup"
          \t\tdata["object_type"] = "details_pickup"
          \t\tdata["currency_id"] = "details"
          \t\tdata["item_type"] = "details"
          \t\tdata["item_form"] = "currency_pickup"
          \t\tdata["storage_route"] = "none"
          \t\tdata["storage_type"] = "none"
          \t\tdata["amount"] = maxi(1, int(data.get("amount", 1)))
          \t\tdata["stackable"] = false
          \t\tdata.erase("physical_item_type")
          \t\tdata.erase("item_class")
          \telif archetype_token == "physical_item" or data.has("physical_item_type") or source_type in ["fuse", "reinforcement", "repair_kit"]:
          \t\tvar physical_item_type: String = _normalized_contract_token(data.get("physical_item_type", data.get("item_type", "fuse")))
          \t\tif not physical_item_type in ["fuse", "reinforcement", "repair_kit"]:
          \t\t\tphysical_item_type = "fuse"
          '''
          catalog = replace_once(catalog, physical_branch, details_and_physical, 'item normalization branches')
          catalog = catalog.replace('data["physical_item_type"] = str(data.get("item_type", "parts"))', 'data["physical_item_type"] = str(data.get("item_type", "fuse"))')
          storage_marker = '''static func get_item_storage_class(item_data: Dictionary) -> String:
          \tvar item_type: String = normalize_item_type(item_data.get("item_type", item_data.get("object_type", "")))
          '''
          storage_replacement = '''static func get_item_storage_class(item_data: Dictionary) -> String:
          \tif str(item_data.get("currency_id", "")).strip_edges().to_lower() == "details" or str(item_data.get("object_type", "")).strip_edges().to_lower() == "details_pickup":
          \t\treturn ITEM_STORAGE_CLASS_UNKNOWN
          \tvar item_type: String = normalize_item_type(item_data.get("item_type", item_data.get("object_type", "")))
          '''
          catalog = replace_once(catalog, storage_marker, storage_replacement, 'Details no inventory storage')
          catalog_path.write_text(catalog)
          PY
