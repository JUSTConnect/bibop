name: Fix Items Details Runtime

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-runtime:
    if: github.event.pull_request.number == 1197
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch runtime compile issues
        run: |
          python3 - <<'PY'
          from pathlib import Path

          service_path = Path('scripts/game/inventory/details_currency_service.gd')
          service = service_path.read_text()
          service = service.replace('_notification("details_received", normalized_reward_id, amount)', '_build_notification_event("details_received", normalized_reward_id, amount)')
          service = service.replace('_notification("details_spent", normalized_transaction_id, amount)', '_build_notification_event("details_spent", normalized_transaction_id, amount)')
          service = service.replace('static func _notification(event_type: String, operation_id: String, amount: int) -> Dictionary:', 'static func _build_notification_event(event_type: String, operation_id: String, amount: int) -> Dictionary:')
          if '_notification(' in service:
              raise SystemExit('notification name conflict remains')
          service_path.write_text(service)

          test_path = Path('tools/ci/check_normal_items_details_mission_manager.gd')
          test = test_path.read_text()
          old = '\t_assert(bool(manager.world_state_store.replace_snapshot([pickup]).get("ok", false)), "Details world failed to load")'
          new = '\tvar pickup_objects: Array[Dictionary] = [pickup]\n\t_assert(bool(manager.world_state_store.replace_snapshot(pickup_objects).get("ok", false)), "Details world failed to load")'
          if test.count(old) != 1:
              raise SystemExit('typed pickup fixture marker missing')
          test_path.write_text(test.replace(old, new, 1))
          PY
      - name: Commit fixes and remove diagnostics
        run: |
          rm -f .github/workflows/diagnose-items-details.yml
          rm -f .github/workflows/fix-items-details-runtime.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/game/inventory/details_currency_service.gd tools/ci/check_normal_items_details_mission_manager.gd .github
          git commit -m "Fix Details service runtime compilation"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
