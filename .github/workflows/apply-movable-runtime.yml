name: Apply Movable Runtime

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-movable-runtime:
    if: github.event.pull_request.number == 1198
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch shared movable runtime paths
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: Path, old: str, new: str, label: str) -> None:
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one marker, found {count}')
              path.write_text(text.replace(old, new, 1))

          # Actor snapshot: canonical actor type and independent manipulator channels.
          actor_path = Path('scripts/game/bipob_runtime_action_actor_service.gd')
          replace_once(
              actor_path,
              '''\tvar held_item: Dictionary = _get_visible_held_item(controller, inventory_state)
          \t
          \treturn {
          \t\t"manipulator_level": controller.get_installed_manipulator_arm_level(),
          \t\t"heavy_claw_level": controller.get_installed_heavy_claw_level(),
          ''',
              '''\tvar held_item: Dictionary = _get_visible_held_item(controller, inventory_state)
          \tvar raw_power_class: String = str(controller.get_bipob_power_class())
          \tvar actor_type: String = MovableActionServiceRef.normalize_actor_type(raw_power_class)
          \t
          \treturn {
          \t\t"actor_type": actor_type,
          \t\t"actor_count": 1,
          \t\t"manipulator_level": controller.get_installed_manipulator_arm_level(),
          \t\t"manipulator_active": controller.get_installed_manipulator_arm_level() > 0,
          \t\t"heavy_claw_level": controller.get_installed_heavy_claw_level(),
          \t\t"heavy_claw_active": controller.has_heavy_claw_capability(),
          ''',
              'actor movable fields'
          )
          replace_once(actor_path, 'class_name BipobRuntimeActionActorService\n', 'class_name BipobRuntimeActionActorService\n\nconst MovableActionServiceRef = preload("res://scripts/game/movable/movable_action_service.gd")\n', 'actor preload')
          replace_once(actor_path, '\t\t"power_class": controller.get_bipob_power_class(),\n', '\t\t"power_class": MovableActionServiceRef.normalize_power_class(raw_power_class),\n', 'actor power class')

          # InteractionSystem delegates all push eligibility and reason codes.
          interaction_path = Path('scripts/world/interaction_system.gd')
          replace_once(interaction_path, 'const WorldObjectCatalogRef = preload("res://scripts/world/world_object_catalog.gd")\n', 'const WorldObjectCatalogRef = preload("res://scripts/world/world_object_catalog.gd")\nconst MovableActionServiceRef = preload("res://scripts/game/movable/movable_action_service.gd")\n', 'interaction preload')
          replace_once(
              interaction_path,
              '''static func _is_heavy_claw_movable_action(action_type: String, target_object: Dictionary) -> bool:
          \tif action_type not in ["push", "pull"]:
          \t\treturn false
          \treturn WorldObjectCatalogRef.can_world_object_be_moved_by_heavy_claw(target_object)
          ''',
              '''static func _is_movable_action(action_type: String, target_object: Dictionary) -> bool:
          \tif action_type != "push":
          \t\treturn false
          \treturn MovableActionServiceRef.is_movable_entity(target_object) or MovableActionServiceRef.is_crate(target_object)
          ''',
              'interaction movable helper'
          )
          replace_once(
              interaction_path,
              '''\tif _is_heavy_claw_movable_action(action_type, target_object):
          \t\tvar object_cell: Vector2i = WorldObjectCatalogRef.to_world_cell(target_object.get("position", actor.get("target_position", Vector2i(-1, -1))), Vector2i(-1, -1))
          \t\tvar actor_cell: Vector2i = WorldObjectCatalogRef.to_world_cell(actor.get("actor_position", Vector2i(-1, -1)), Vector2i(-1, -1))
          \t\tvar facing_direction: Vector2i = Vector2i(actor.get("facing_direction", Vector2i.ZERO))
          \t\tif object_cell != actor_cell + facing_direction:
          \t\t\treturn _result(false, "Face the object to attach Heavy Claw.", [], "face_object_to_attach_heavy_claw")
          ''',
              '''\tif _is_movable_action(action_type, target_object):
          \t\tvar movement_gate: Dictionary = MovableActionServiceRef.preview_action(actor, target_object, action_type)
          \t\tif not bool(movement_gate.get("success", false)):
          \t\t\treturn _result(false, str(movement_gate.get("message", "Movement unavailable.")), [], str(movement_gate.get("code", MovableActionServiceRef.CODE_NOT_MOVABLE)))
          ''',
              'interaction movable gate'
          )

          # Action controller routes push for every canonical movable and commits direct push cost.
          action_path = Path('scripts/bipob/bipob_action_controller.gd')
          replace_once(action_path, 'const InteractionActionCostServiceRef = preload("res://scripts/game/interaction/interaction_action_cost_service.gd")\n', 'const InteractionActionCostServiceRef = preload("res://scripts/game/interaction/interaction_action_cost_service.gd")\nconst MovableActionServiceRef = preload("res://scripts/game/movable/movable_action_service.gd")\n', 'action preload')
          replace_once(action_path, 'if action_id in ["push", "pull"] and WorldObjectCatalogRef.can_world_object_be_moved_by_heavy_claw(world_object):', 'if action_id == "push" and (MovableActionServiceRef.is_movable_entity(world_object) or MovableActionServiceRef.is_crate(world_object)):', 'action route')
          replace_once(
              action_path,
              '''\tif WorldObjectCatalogRef.can_world_object_be_moved_by_heavy_claw(world_object) and not controller.has_heavy_claw_capability():
          \t\tcontroller.hint_requested.emit("Heavy Claw required.")
          \telif not unavailable_label.is_empty() and unavailable_label != "Action":
          ''',
              '''\tif not unavailable_label.is_empty() and unavailable_label != "Action":
          ''',
              'action disabled message'
          )
          replace_once(
              action_path,
              '''\tvar claw_execution: Dictionary = BipobHeavyClawExecutionServiceRef.execute_heavy_claw_action(controller, world_object, target_position, action_id)
          \tcontroller.hint_requested.emit(str(claw_execution.get("message", "Cannot move object there.")))
          \t_apply_action_execution_refresh(controller, claw_execution)
          ''',
              '''\tvar claw_execution: Dictionary = BipobHeavyClawExecutionServiceRef.execute_heavy_claw_action(controller, world_object, target_position, action_id)
          \tif bool(claw_execution.get("success", false)) and bool(claw_execution.get("pending_paid_action", false)):
          \t\tInteractionActionCostServiceRef.commit_gameplay_action(controller, claw_execution)
          \tcontroller.hint_requested.emit(str(claw_execution.get("message", "Cannot move object there.")))
          \t_apply_action_execution_refresh(controller, claw_execution)
          ''',
              'direct push action cost'
          )

          # Action list exposes push even when disabled, so shared reason codes reach the view model.
          controller_path = Path('scripts/bipob/bipob_controller.gd')
          replace_once(
              controller_path,
              '''\telif group == "physical_object":
          \t\tif has_magnetic_manipulator() and (bool(world_object.get("magnetic", false)) or Array(world_object.get("material_tags", [])).has("metal")):
          \t\t\tactions.append("pull")
          \t\tif WorldObjectCatalog.can_world_object_be_moved_by_heavy_claw(world_object) and has_heavy_claw_capability() and not actions.has("push"):
          \t\t\tactions.append("push")
          ''',
              '''\telif group == "physical_object":
          \t\tif has_magnetic_manipulator() and (bool(world_object.get("magnetic", false)) or Array(world_object.get("material_tags", [])).has("metal")):
          \t\t\tactions.append("pull")
          \t\tif WorldObjectCatalog.is_world_object_movable(world_object) and not actions.has("push"):
          \t\t\tactions.append("push")
          ''',
              'physical object action list'
          )
          replace_once(
              controller_path,
              '''\telif WorldObjectCatalog.can_world_object_be_moved_by_heavy_claw(world_object):
          \t\tif has_heavy_claw_capability() and not actions.has("push"):
          \t\t\tactions.append("push")
          ''',
              '''\telif WorldObjectCatalog.is_world_object_movable(world_object):
          \t\tif not actions.has("push"):
          \t\t\tactions.append("push")
          ''',
              'nonphysical movable action list'
          )

          # Execution facade supports direct regular-manipulator push and Heavy Claw drag.
          execution_path = Path('scripts/game/bipob_heavy_claw_execution_service.gd')
          execution_path.write_text('''extends RefCounted
          class_name BipobHeavyClawExecutionService

          const MovableActionServiceRef = preload("res://scripts/game/movable/movable_action_service.gd")
          const BipobRuntimeActionActorServiceRef = preload("res://scripts/game/bipob_runtime_action_actor_service.gd")

          static func execute_heavy_claw_action(controller: Variant, world_object: Dictionary, target_position: Vector2i, action_id: String) -> Dictionary:
          \tif action_id != "push":
          \t\treturn _build_result(false, false, "Movement action is unsupported.", false, false, false, false, true, false, MovableActionServiceRef.CODE_ACTION_UNSUPPORTED)
          \tvar actor: Dictionary = BipobRuntimeActionActorServiceRef.build_runtime_action_actor(controller, world_object, target_position)
          \tvar preview: Dictionary = MovableActionServiceRef.preview_action(actor, world_object, action_id)
          \tif not bool(preview.get("success", false)):
          \t\treturn _build_result(true, false, str(preview.get("message", "Movement unavailable.")), false, false, false, false, true, false, str(preview.get("code", MovableActionServiceRef.CODE_NOT_MOVABLE)))
          \tvar requirement: Dictionary = Dictionary(preview.get("movement_requirement", {}))
          \tvar movement_mode: String = str(requirement.get("movement_mode", MovableActionServiceRef.MOVEMENT_PUSH))
          \tif movement_mode == MovableActionServiceRef.MOVEMENT_DRAG:
          \t\tif controller.has_method("start_heavy_claw_drag"):
          \t\t\tvar attach_result: Dictionary = Dictionary(controller.call("start_heavy_claw_drag", world_object))
          \t\t\tif bool(attach_result.get("success", false)):
          \t\t\t\treturn _build_result(true, true, str(attach_result.get("message", "Heavy Claw attached.")), false, true, true, true, true, true, MovableActionServiceRef.CODE_VALID)
          \t\t\treturn _build_result(true, false, str(attach_result.get("message", "Cannot attach object.")), false, false, false, true, true, false, str(attach_result.get("code", "attach_unavailable")))
          \t\treturn _build_result(true, false, "Heavy Claw drag unavailable.", false, false, false, false, true, false, "drag_unavailable")
          \tif controller.mission_manager == null or not controller.mission_manager.has_method("move_world_object_with_requirements"):
          \t\treturn _build_result(true, false, "Object movement unavailable.", false, false, false, false, true, false, "movement_service_unavailable")
          \tvar direction: Vector2i = controller.get_direction_vector(controller.direction)
          \tvar destination: Vector2i = target_position + direction
          \tvar move_result: Dictionary = Dictionary(controller.mission_manager.call("move_world_object_with_requirements", str(world_object.get("id", "")), destination, actor, action_id))
          \tif not bool(move_result.get("success", false)):
          \t\treturn _build_result(true, false, str(move_result.get("message", "Cannot move object there.")), false, false, false, true, true, false, str(move_result.get("code", "movement_failed")))
          \treturn _build_result(true, true, str(move_result.get("message", "Object moved.")), true, true, true, true, true, true, str(move_result.get("code", MovableActionServiceRef.CODE_VALID)), true)

          static func _build_result(handled: bool, success: bool, message: String, spent_action: bool, refresh_overlay: bool, refresh_threats: bool, refresh_action_panel: bool, emit_status: bool, emit_facing_hint: bool, reason: String, pending_paid_action: bool = false) -> Dictionary:
          \treturn {"handled": handled, "success": success, "ok": success, "code": reason, "reason_code": reason, "message": message, "spent_action": spent_action, "refresh_overlay": refresh_overlay, "refresh_threats": refresh_threats, "refresh_action_panel": refresh_action_panel, "emit_status": emit_status, "emit_facing_hint": emit_facing_hint, "reason": reason, "pending_paid_action": pending_paid_action}
          ''')

          # Drag attachment and every drag step use the same actor/profile resolver.
          drag_path = Path('scripts/game/heavy_claw/heavy_claw_drag_service.gd')
          replace_once(drag_path, 'const WorldObjectCatalogRef = preload("res://scripts/world/world_object_catalog.gd")\n', 'const WorldObjectCatalogRef = preload("res://scripts/world/world_object_catalog.gd")\nconst MovableActionServiceRef = preload("res://scripts/game/movable/movable_action_service.gd")\nconst BipobRuntimeActionActorServiceRef = preload("res://scripts/game/bipob_runtime_action_actor_service.gd")\n', 'drag preloads')
          replace_once(
              drag_path,
              '''\tif not WorldObjectCatalogRef.can_world_object_be_moved_by_heavy_claw(object_data):
          \t\treturn {"success": false, "message": "Object is too heavy."}
          ''',
              '''\tvar actor: Dictionary = BipobRuntimeActionActorServiceRef.build_runtime_action_actor(controller, object_data, Vector2i(object_data.get("position", Vector2i(-1, -1))))
          \tvar movement_gate: Dictionary = MovableActionServiceRef.preview_action(actor, object_data, "push")
          \tif not bool(movement_gate.get("success", false)):
          \t\treturn {"success": false, "ok": false, "code": str(movement_gate.get("code", "movement_unavailable")), "reason_code": str(movement_gate.get("code", "movement_unavailable")), "message": str(movement_gate.get("message", "Movement unavailable."))}
          \tif str(Dictionary(movement_gate.get("movement_requirement", {})).get("movement_mode", "")) != MovableActionServiceRef.MOVEMENT_DRAG:
          \t\treturn {"success": false, "ok": false, "code": MovableActionServiceRef.CODE_ACTION_UNSUPPORTED, "reason_code": MovableActionServiceRef.CODE_ACTION_UNSUPPORTED, "message": "Heavy Claw drag is not required for this object."}
          ''',
              'drag attach gate'
          )
          replace_once(
              drag_path,
              '''\tvar move_result: Dictionary = Dictionary(controller.mission_manager.call("move_world_object_by_heavy_claw", controller.heavy_claw_drag_object_id, object_destination))
          ''',
              '''\tvar actor: Dictionary = BipobRuntimeActionActorServiceRef.build_runtime_action_actor(controller, object_data, object_cell)
          \tvar move_result: Dictionary = Dictionary(controller.mission_manager.call("move_world_object_with_requirements", controller.heavy_claw_drag_object_id, object_destination, actor, "move"))
          ''',
              'drag move call'
          )

          # MissionManager owns destination validation and commits only successful moves.
          mission_path = Path('scripts/game/mission_manager.gd')
          replace_once(mission_path, 'const NormalItemContractRef = preload("res://scripts/game/inventory/normal_item_contract.gd")\n', 'const NormalItemContractRef = preload("res://scripts/game/inventory/normal_item_contract.gd")\nconst MovableActionServiceRef = preload("res://scripts/game/movable/movable_action_service.gd")\n', 'mission preload')
          mission_text = mission_path.read_text()
          pattern = r'func move_world_object_by_heavy_claw\(object_id: String, target_cell: Vector2i\) -> Dictionary:\n.*?\nfunc refresh_world_cooling_received\(\) -> void:'
          replacement = '''func preview_movable_action(actor: Dictionary, object_id: String, target_cell: Vector2i, action_id: String = "push") -> Dictionary:
          \tvar object_data: Dictionary = get_world_object_by_id(object_id)
          \tif object_data.is_empty():
          \t\treturn MovableActionServiceRef.preview_action(actor, object_data, action_id)
          \tvar from_cell: Vector2i = WorldObjectCatalogRef.to_world_cell(object_data.get("position", Vector2i(-1, -1)), Vector2i(-1, -1))
          \tvar target_cell_state: Dictionary = get_runtime_cell_state(target_cell)
          \tvar from_surface: Dictionary = PlatformOccupancyServiceRef.get_surface_context_for_cell(from_cell, mission_world_objects)
          \tvar target_surface: Dictionary = PlatformOccupancyServiceRef.get_surface_context_for_cell(target_cell, mission_world_objects)
          \tvar target_platform: Dictionary = PlatformOccupancyServiceRef.get_platform_for_cell(target_cell, mission_world_objects)
          \tvar target_object: Dictionary = get_blocking_object_at_cell_for_push(target_cell)
          \tvar context: Dictionary = {
          \t\t"validate_destination": true,
          \t\t"validate_target_relation": true,
          \t\t"from_cell": from_cell,
          \t\t"to_cell": target_cell,
          \t\t"in_bounds": bool(target_cell_state.get("in_bounds", false)),
          \t\t"destination_passable": bool(target_cell_state.get("is_passable", false)) or not target_platform.is_empty(),
          \t\t"destination_occupied": not target_object.is_empty(),
          \t\t"surface_move_allowed": PlatformOccupancyServiceRef.is_surface_move_allowed(from_surface, target_surface)
          \t}
          \treturn MovableActionServiceRef.preview_action(actor, object_data, action_id, context)

          func move_world_object_with_requirements(object_id: String, target_cell: Vector2i, actor: Dictionary, action_id: String = "push") -> Dictionary:
          \tvar preview: Dictionary = preview_movable_action(actor, object_id, target_cell, action_id)
          \tif not bool(preview.get("success", false)):
          \t\treturn preview
          \tvar object_data: Dictionary = get_world_object_by_id(object_id)
          \tvar target_surface: Dictionary = PlatformOccupancyServiceRef.get_surface_context_for_cell(target_cell, mission_world_objects)
          \tobject_data = PlatformOccupancyServiceRef.attach_entity_to_surface(object_data, target_surface)
          \t_move_world_state_object(object_id, target_cell, object_data)
          \tvar result: Dictionary = preview.duplicate(true)
          \tresult["success"] = true
          \tresult["ok"] = true
          \tresult["code"] = MovableActionServiceRef.CODE_VALID
          \tresult["reason_code"] = MovableActionServiceRef.CODE_VALID
          \tresult["from"] = Dictionary(preview.get("details", {})).get("from_cell", object_data.get("position", Vector2i(-1, -1)))
          \tresult["to"] = target_cell
          \tresult["message"] = "Moved %s." % str(object_data.get("display_name", object_data.get("name", "Object")))
          \tresult["affected_ids"] = [object_id]
          \treturn result

          func move_world_object_by_heavy_claw(object_id: String, target_cell: Vector2i, actor: Dictionary = {}) -> Dictionary:
          \tvar resolved_actor: Dictionary = actor.duplicate(true)
          \tif resolved_actor.is_empty():
          \t\tvar object_data: Dictionary = get_world_object_by_id(object_id)
          \t\tvar object_cell: Vector2i = WorldObjectCatalogRef.to_world_cell(object_data.get("position", Vector2i(-1, -1)), Vector2i(-1, -1))
          \t\tresolved_actor = {"actor_type":"heavy", "actor_count":1, "power_class":"heavy", "manipulator_level":0, "manipulator_active":false, "manipulator_occupied":false, "heavy_claw_level":99, "heavy_claw_active":true, "actor_position":object_cell, "facing_direction":Vector2i.ZERO}
          \treturn move_world_object_with_requirements(object_id, target_cell, resolved_actor, "move")

          func refresh_world_cooling_received() -> void:'''
          updated, count = re.subn(pattern, replacement, mission_text, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'mission movable block: replaced {count}')
          mission_path.write_text(updated)
          PY
      - name: Commit runtime integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/game scripts/world/interaction_system.gd scripts/bipob
          git commit -m "Integrate shared movable action resolver"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
