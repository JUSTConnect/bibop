name: Run Canonical Cleanup V2
on: pull_request
permissions:
  contents: write
jobs:
  apply:
    if: github.event.pull_request.number == 1203
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/finalize-canonical-runtime
          fetch-depth: 0
      - run: python3 tools/apply_canonical_store_reel_cleanup.py
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add scripts/world/world_state_store.gd scripts/game/power_cable_reel_service.gd scripts/world/versioned_snapshot_migration_service.gd
          git commit -m 'Remove store and reel legacy runtime paths'
          git push
