name: Access Binding Contract Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  access-binding-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false

      - name: Import project
        run: godot --headless --path . --import

      - name: Access resolver behavior
        run: timeout 60s godot --headless --path . --script res://tools/ci/check_access_resolver.gd

      - name: Deterministic any-of behavior
        run: timeout 60s godot --headless --path . --script res://tools/ci/check_access_any_of.gd

      - name: Access runtime integration
        run: timeout 60s godot --headless --path . --script res://tools/ci/check_access_runtime_service.gd

      - name: Binding editor integration
        run: timeout 60s godot --headless --path . --script res://tools/ci/check_access_binding_service.gd
