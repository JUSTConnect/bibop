name: Passive Route Contract Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  passive-route-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Static architecture gate
        run: |
          git diff --check
          python tools/check_cooling_routing_contours.py

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false

      - name: Godot import smoke
        run: godot --headless --path . --import

      - name: Passive route behavior gate
        run: godot --headless --path . --script res://tools/ci/check_passive_route_service.gd

      - name: Passive route integration gate
        run: godot --headless --path . --script res://tools/ci/check_passive_route_integration.gd
