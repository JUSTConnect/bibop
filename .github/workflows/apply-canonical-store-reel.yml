name: Apply Canonical Store Reel

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-canonical-store-reel:
    if: github.event.pull_request.number == 1204
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Remove store and reel compatibility paths
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          store_path = Path('scripts/world/world_state_store.gd')
          store = store_path.read_text()
          pattern = r'func replace_serialized_snapshot\(snapshot: Dictionary\) -> Dictionary:\n.*?\nfunc add_object\(object_data: Dictionary\) -> Dictionary:'
          replacement = '''func replace_serialized_snapshot(snapshot: Dictionary) -> Dictionary:
          \tvar source_version: int = int(snapshot.get("format_version", -1))
          \tif source_version != WORLD_SNAPSHOT_FORMAT_VERSION:
          \t\treturn BindingStoreContractRef.make_result("invalid_format_version", {}, {"expected":WORLD_SNAPSHOT_FORMAT_VERSION, "actual":source_version})
          \tvar raw_entities: Variant = snapshot.get("entities", null)
          \tif not raw_entities is Array:
          \t\treturn BindingStoreContractRef.make_result("missing", {}, {"field":"entities"})
          \tvar entities: Array[Dictionary] = []
          \tfor entity_value in Array(raw_entities):
          \t\tif not entity_value is Dictionary:
          \t\t\treturn BindingStoreContractRef.make_result("missing", {}, {"field":"entities", "reason":"entity_not_dictionary"})
          \t\tentities.append(Dictionary(entity_value).duplicate(true))
          \tvar raw_bindings: Variant = snapshot.get("bindings", null)
          \tif not raw_bindings is Array:
          \t\treturn BindingStoreContractRef.make_result("missing", {}, {"field":"bindings"})
          \tvar bindings: Array[Dictionary] = []
          \tfor binding_value in Array(raw_bindings):
          \t\tif not binding_value is Dictionary:
          \t\t\treturn BindingStoreContractRef.make_result("missing", {}, {"field":"bindings", "reason":"binding_not_dictionary"})
          \t\tbindings.append(Dictionary(binding_value).duplicate(true))
          \tvar built: Dictionary = _build_state_from_objects(entities)
          \tif not bool(built.get("ok", false)):
          \t\treturn built
          \tvar objects_by_id: Dictionary = Dictionary(built.get("objects_by_id", {}))
          \tvar binding_built: Dictionary = BindingStoreContractRef.build_state(bindings, objects_by_id, true)
          \tif not bool(binding_built.get("ok", false)):
          \t\treturn binding_built
          \t_commit_state(objects_by_id, Array(built.get("object_order", [])), Dictionary(built.get("indexes", {})))
          \t_commit_binding_state(Dictionary(binding_built.get("bindings_by_id", {})), Dictionary(binding_built.get("indexes", {})))
          \tvar diagnostics: Array = Array(binding_built.get("diagnostics", [])).duplicate(true)
          \tchanged.emit({"action":"replace_serialized_snapshot", "warnings":[], "count":_object_order.size(), "binding_count":_bindings_by_id.size(), "binding_diagnostics":diagnostics})
          \treturn _ok({"object_count":_object_order.size(), "binding_count":_bindings_by_id.size(), "binding_diagnostics":diagnostics})

          func get_serializable_snapshot() -> Dictionary:
          \tvar entities: Array[Dictionary] = []
          \tfor object_id in _object_order:
          \t\tentities.append(Dictionary(_objects_by_id[object_id]).duplicate(true))
          \treturn {"format_version":WORLD_SNAPSHOT_FORMAT_VERSION, "entities":entities, "bindings":get_all_bindings()}

          func add_object(object_data: Dictionary) -> Dictionary:'''
          store, count = re.subn(pattern, replacement, store, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'WorldStateStore snapshot block replaced {count}')
          migrate_pattern = r'\nfunc migrate_legacy_bindings\(\) -> Dictionary:\n.*?\nfunc _duplicate_objects_by_id'
          store, count = re.subn(migrate_pattern, '\nfunc _duplicate_objects_by_id', store, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'WorldStateStore legacy binding method removed {count}')
          store_path.write_text(store)

          reel_path = Path('scripts/game/power_cable_reel_service.gd')
          reel = reel_path.read_text()
          canonical_pattern = r'static func canonicalize_reel\(reel: Dictionary\) -> Dictionary:\n.*?\n\treturn result\n'
          canonical_replacement = '''static func migrate_legacy_reel(source: Dictionary) -> Dictionary:
          \tvar migrated: Dictionary = source.duplicate(true)
          \tif not migrated.get(END_1, {}) is Dictionary or Dictionary(migrated.get(END_1, {})).is_empty():
          \t\tmigrated[END_1] = {"state":str(migrated.get("end_1_state", END_ON_REEL)), "target_id":str(migrated.get("end_1_target_id", ""))}
          \tif not migrated.get(END_2, {}) is Dictionary or Dictionary(migrated.get(END_2, {})).is_empty():
          \t\tmigrated[END_2] = {"state":str(migrated.get("end_2_state", END_ON_REEL)), "target_id":str(migrated.get("end_2_target_id", ""))}
          \tif not migrated.has("path_cells") and migrated.has("cable_path_cells"):
          \t\tmigrated["path_cells"] = Array(migrated.get("cable_path_cells", [])).duplicate(true)
          \treturn canonicalize_reel(migrated)

          static func canonicalize_reel(reel: Dictionary) -> Dictionary:
          \tvar result: Dictionary = reel.duplicate(true)
          \tresult["format_version"] = FORMAT_VERSION
          \tresult["runtime_power_profile"] = "power_cable_reel"
          \tresult[END_1] = _canonical_endpoint(result.get(END_1, {}))
          \tresult[END_2] = _canonical_endpoint(result.get(END_2, {}))
          \tresult["path_cells"] = _to_cells(result.get("path_cells", []))
          \tresult["connection_state"] = str(result.get("connection_state", CONNECTION_DISCONNECTED)).strip_edges().to_lower()
          \tif str(result.get("connection_state", "")) not in [CONNECTION_DISCONNECTED, CONNECTION_PARTIAL, CONNECTION_COMPLETE, CONNECTION_INVALID, CONNECTION_BROKEN]:
          \t\tresult["connection_state"] = CONNECTION_INVALID
          \tresult["reconnect_required"] = bool(result.get("reconnect_required", false))
          \tfor legacy_field in ["end_1_state", "end_1_target_id", "end_2_state", "end_2_target_id", "cable_path_cells", "connected_side_1", "connected_side_2", "connected", "disconnected"]:
          \t\tresult.erase(legacy_field)
          \tresult["cable_length"] = maxi(0, Array(result.get("path_cells", [])).size() - 1)
          \tresult["is_connected"] = _both_ends_connected(result)
          \treturn result
          '''
          reel, count = re.subn(canonical_pattern, canonical_replacement, reel, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'reel canonical block replaced {count}')
          reel = reel.replace('\t_sync_legacy_aliases(reel)\n', '')
          reel = reel.replace('\t_sync_legacy_aliases(next_reel)\n', '')
          endpoint_pattern = r'static func _canonical_endpoint\(value: Variant, legacy_state: Variant, legacy_target_id: Variant\) -> Dictionary:\n.*?\n\treturn \{"state": state, "target_id": target_id\}\n\nstatic func _sync_legacy_aliases\(reel: Dictionary\) -> void:\n.*?\n\treel\["disconnected"\] = not bool\(reel.get\("is_connected", false\)\)\n'
          endpoint_replacement = '''static func _canonical_endpoint(value: Variant) -> Dictionary:
          \tvar endpoint: Dictionary = {}
          \tif value is Dictionary:
          \t\tendpoint = Dictionary(value).duplicate(true)
          \tvar state: String = str(endpoint.get("state", END_ON_REEL)).strip_edges().to_lower()
          \tif state not in END_STATES:
          \t\tstate = END_ON_REEL
          \tvar target_id: String = str(endpoint.get("target_id", "")).strip_edges()
          \tif state != END_CONNECTED:
          \t\ttarget_id = ""
          \treturn {"state":state, "target_id":target_id}
          '''
          reel, count = re.subn(endpoint_pattern, endpoint_replacement, reel, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'reel alias helper removed {count}')
          reel_path.write_text(reel)

          migration_path = Path('scripts/world/versioned_snapshot_migration_service.gd')
          migration = migration_path.read_text()
          old_call = 'entity = PowerCableReelServiceRef.canonicalize_reel(entity)'
          if migration.count(old_call) != 1:
              raise SystemExit('versioned reel migration call marker missing')
          migration_path.write_text(migration.replace(old_call, 'entity = PowerCableReelServiceRef.migrate_legacy_reel(entity)', 1))
          PY
      - name: Commit canonical cleanup
        run: |
          rm -f .github/workflows/apply-canonical-store-reel.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/world/world_state_store.gd scripts/game/power_cable_reel_service.gd scripts/world/versioned_snapshot_migration_service.gd .github/workflows/apply-canonical-store-reel.yml
          git commit -m "Remove store and reel legacy runtime paths"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
