name: Godot Parser Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  godot-parser-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: ScreenRouter static gate
        run: python3 tools/check_screen_router.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false

      - name: Diff and GDScript safety
        run: |
          git diff --check
          python tools/check_gdscript_safety_patterns.py

      - name: Map Constructor proxy and rendering boundaries
        run: |
          python tools/check_map_constructor_game_ui_proxy.py
          python tools/check_grid_manager_rendering_boundary.py

      - name: Map Constructor sections and placement contracts
        run: |
          python tools/check_map_constructor_sections.py
          python tools/check_constructor_placement_contract.py

      - name: Catalog and entity definition static contracts
        run: |
          python tools/check_map_constructor_prefab_catalog.py
          python tools/check_entity_definition_contracts.py

      - name: World state, bindings and cable reel static contracts
        run: |
          python tools/check_world_state_store.py
          python tools/check_binding_store.py
          python tools/check_power_cable_reel.py
          python tools/check_machine_legacy_link_migration.py
          python tools/check_active_cooling_box_service.py

      - name: Readiness and runtime HUD static contracts
        run: |
          python tools/check_runtime_readiness_service.py
          python tools/check_event_driven_runtime_hud.py

      - name: Godot import smoke
        run: godot --headless --path . --import

      - name: Parse all GDScript
        run: godot --headless --path . --script res://tools/ci/parse_all_gd.gd

      - name: Map Constructor session state contract
        run: godot --headless --path . --script res://tools/ci/check_map_constructor_session_state_contract.gd

      - name: Runtime readiness behavior
        run: godot --headless --path . --script res://tools/ci/check_runtime_readiness_service.gd

      - name: Event-driven runtime HUD behavior
        run: godot --headless --path . --script res://tools/ci/check_event_driven_runtime_hud.gd

      - name: ScreenRouter behavior
        run: godot --headless --path . --script res://tools/ci/check_screen_router.gd

      - name: Map Constructor issue contract
        run: godot --headless --path . --script res://tools/ci/check_map_constructor_issue_contract.gd

      - name: Map Constructor readiness contract
        run: godot --headless --path . --script res://tools/ci/check_map_constructor_readiness_contract.gd

      - name: Map Constructor readiness facade
        run: godot --headless --path . --script res://tools/ci/check_map_constructor_readiness_facade.gd

      - name: Map Constructor schema snapshot
        run: godot --headless --path . --script res://tools/ci/check_map_constructor_schema_snapshot.gd

      - name: Map Constructor schema renderer integration
        run: godot --headless --path . --script res://tools/ci/check_map_constructor_schema_renderer_integration.gd

      - name: Map Constructor diagnostic policy
        run: godot --headless --path . --script res://tools/ci/check_map_constructor_diagnostic_policy.gd

      - name: Entity definition contract gate
        run: godot --headless --path . --script res://tools/ci/check_entity_definition_contracts.gd

      - name: Entity contract consistency gate
        run: godot --headless --path . --script res://tools/ci/check_entity_contract_consistency.gd

      - name: World state and runtime power gates
        run: |
          godot --headless --path . --script res://tools/ci/check_world_state_store.gd
          godot --headless --path . --script res://tools/ci/check_binding_store.gd
          godot --headless --path . --script res://tools/ci/check_binding_store_mission_manager.gd
          godot --headless --path . --script res://tools/ci/check_power_control_resolver.gd
          godot --headless --path . --script res://tools/ci/check_power_control_runtime_service.gd
          godot --headless --path . --script res://tools/ci/check_stationary_power_migration.gd
          godot --headless --path . --script res://tools/ci/check_power_cable_reel.gd
          godot --headless --path . --script res://tools/ci/check_power_cable_reel_mission_manager.gd
          godot --headless --path . --script res://tools/ci/check_grid_manager_renderer_contract.gd

      - name: Constructor placement behavior gate
        run: godot --headless --path . --script res://tools/ci/check_constructor_placement_contracts.gd

      - name: Map Constructor prefab catalog gate
        run: timeout 120s godot --headless --path . --script res://tools/ci/check_map_constructor_prefab_catalog.gd
