name: Runtime Debug Extraction Bootstrap

on:
  pull_request:

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.head_ref == 'codex/bip-architecture-coordinators-02f3-runtime-debug-overlays'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02f3-runtime-debug-overlays
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Execute prepared installer
        run: |
          git show origin/main:.github/workflows/godot-parser-gate.yml > .github/workflows/godot-parser-gate.yml
          python - <<'PY'
          from pathlib import Path
          import subprocess

          lines = Path('.github/workflows/renderer-component-gate.yml').read_text().splitlines()
          blocks = []
          index = 0
          while index < len(lines):
              line = lines[index]
              if line.strip() != 'run: |':
                  index += 1
                  continue
              indent = len(line) - len(line.lstrip())
              content_indent = indent + 2
              index += 1
              block = []
              while index < len(lines):
                  current = lines[index]
                  current_indent = len(current) - len(current.lstrip())
                  if current.strip() and current_indent <= indent:
                      break
                  block.append(current[content_indent:] if len(current) >= content_indent else '')
                  index += 1
              blocks.append('\n'.join(block))
          if len(blocks) != 3:
              raise RuntimeError(f'expected 3 installer blocks, got {len(blocks)}')
          for number, block in enumerate(blocks, start=1):
              print(f'Executing installer block {number}')
              subprocess.run(['bash', '-euxo', 'pipefail', '-c', block], check=True)
          PY
