name: Godot Parser Gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  godot-parser-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: ScreenRouter static gate
        run: |
          python3 tools/check_screen_router.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false

      - name: Static checks
        run: |
          git diff --check
          python tools/check_gdscript_safety_patterns.py
          python tools/check_map_constructor_game_ui_proxy.py
          python tools/check_grid_manager_rendering_boundary.py
          python tools/check_map_constructor_sections.py
          python tools/check_constructor_placement_contract.py
          python tools/check_map_constructor_prefab_catalog.py
          python tools/check_world_state_store.py
          python tools/check_runtime_readiness_service.py
          python tools/check_event_driven_runtime_hud.py

      - name: Godot import smoke
        run: |
          godot --headless --path . --import

      - name: GDScript parser/load gate
        run: |
          godot --headless --path . --script res://tools/ci/parse_all_gd.gd
          godot --headless --path . --script res://tools/ci/check_map_constructor_session_state_contract.gd
          godot --headless --path . --script res://tools/ci/check_runtime_readiness_service.gd
          godot --headless --path . --script res://tools/ci/check_event_driven_runtime_hud.gd
          godot --headless --path . --script res://tools/ci/check_screen_router.gd

      - name: World state store behavior gate
        run: |
          godot --headless --path . --script res://tools/ci/check_world_state_store.gd
          godot --headless --path . --script res://tools/ci/check_grid_manager_renderer_contract.gd

      - name: Constructor placement behavior gate
        run: |
          godot --headless --path . --script res://tools/ci/check_constructor_placement_contracts.gd

      - name: Map Constructor prefab catalog gate
        run: |
          timeout 120s godot --headless --path . \
            --script res://tools/ci/check_map_constructor_prefab_catalog.gd

  capture-screen-router-static-failure:
    if: github.event_name == 'pull_request' && github.head_ref == 'codex/bip-architecture-runtime-01e-screen-router'
    runs-on: ubuntu-latest

    steps:
      - name: Check out ScreenRouter branch
        uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-runtime-01e-screen-router
          fetch-depth: 0

      - name: Capture audit output
        run: |
          set +e
          python3 tools/check_screen_router.py > /tmp/screen_router_static.log 2>&1
          status=$?
          cat /tmp/screen_router_static.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/screen_router_static.log docs/screen_router_static_failure.md
            git config user.name "ChatGPT Project Maintainer"
            git config user.email "actions@users.noreply.github.com"
            git add docs/screen_router_static_failure.md
            git commit -m "Capture ScreenRouter static audit failure"
            git push origin HEAD:codex/bip-architecture-runtime-01e-screen-router
          fi
          exit "$status"
