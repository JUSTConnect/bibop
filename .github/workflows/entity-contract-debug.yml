name: Entity Contract Diagnostic

on:
  push:
    branches:
      - codex/add-declarative-entity-definitions-and-completeness-gate
    paths:
      - .github/workflows/entity-contract-debug.yml

permissions:
  contents: write

jobs:
  entity-contract-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/add-declarative-entity-definitions-and-completeness-gate
          fetch-depth: 0
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - run: godot --headless --path . --import
      - name: Capture entity contract consistency diagnostics
        run: |
          set +e
          godot --headless --path . --script res://tools/ci/check_entity_contract_consistency.gd > tools/ci/entity-contract-debug-output.txt 2>&1
          echo "exit_code=$?" >> tools/ci/entity-contract-debug-output.txt
      - name: Commit diagnostic output
        run: |
          git config user.name "Bipob Assistant"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/ci/entity-contract-debug-output.txt
          git commit -m "chore: capture consistency gate diagnostic output"
          git push origin HEAD:codex/add-declarative-entity-definitions-and-completeness-gate