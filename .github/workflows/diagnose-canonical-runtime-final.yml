name: Diagnose Canonical Runtime Final

on:
  pull_request:

jobs:
  diagnose:
    if: github.event.pull_request.number == 1203
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - name: Capture static and behavior results
        run: |
          mkdir -p /tmp/canonical-runtime-final
          set +e
          python tools/check_canonical_runtime_ownership_v2.py > /tmp/canonical-runtime-final/static.log 2>&1
          echo $? > /tmp/canonical-runtime-final/static.exit
          godot --headless --path . --import > /tmp/canonical-runtime-final/import.log 2>&1
          timeout 120s godot --headless --path . --script res://tools/ci/check_canonical_runtime_ownership.gd > /tmp/canonical-runtime-final/behavior.log 2>&1
          echo $? > /tmp/canonical-runtime-final/behavior.exit
          {
            echo '## temporary files'
            find .github/workflows tools -maxdepth 2 -type f | grep -E '(audit-canonical|diagnose-canonical|retarget-cleanup|run-canonical|apply_canonical|patch-task)' || true
            echo '## message inference'
            grep -nE 'issue.get\("message"[^\n]*(begins_with|contains|ends_with)' scripts/game/task_test_acceptance_validation_service.gd || true
            echo '## store legacy paths'
            grep -nE 'snapshot.get\("objects"|migrate_legacy_bindings|legacy_candidates|strip_legacy_logical_links' scripts/world/world_state_store.gd || true
            echo '## reel alias writes'
            grep -nE '\["(end_1_state|end_1_target_id|end_2_state|end_2_target_id|cable_path_cells)"\][[:space:]]*=' scripts/game/power_cable_reel_service.gd || true
          } > /tmp/canonical-runtime-final/references.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: canonical-runtime-final-diagnostics
          path: /tmp/canonical-runtime-final
          if-no-files-found: error
