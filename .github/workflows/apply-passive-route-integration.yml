name: Apply Passive Route Validation

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-passive-route-validation:
    if: github.event.pull_request.number == 1199
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch validation
        run: python3 .github/passive_route_validation_patch.py
      - name: Commit validation and remove temporary files
        run: |
          rm -f .github/passive_route_validation_patch.py
          rm -f .github/workflows/apply-passive-route-integration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/game/map_constructor_validation_service.gd .github
          git commit -m "Validate passive routes with stable issue codes"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
