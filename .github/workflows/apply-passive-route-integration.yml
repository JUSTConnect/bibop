name: Apply Passive Route Rendering

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-passive-route-rendering:
    if: github.event.pull_request.number == 1199
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch route presentation path
        run: |
          python3 - <<'PY'
          from pathlib import Path

          room_path = Path('scripts/field/room_visual_renderer.gd')
          room = room_path.read_text()
          preload = 'const RouteRendererRef = preload("res://scripts/visual/renderer/route_renderer.gd")\n'
          if 'PassiveRouteServiceRef' not in room:
              if room.count(preload) != 1:
                  raise SystemExit('room route renderer preload missing')
              room = room.replace(preload, preload + 'const PassiveRouteServiceRef = preload("res://scripts/game/cooling/passive_route_service.gd")\n', 1)
          old_mode = 'func get_wall_routing_mode(object_data: Dictionary) -> String:\n\treturn RouteRendererRef.normalize_wall_routing_mode(object_data)\n'
          new_mode = 'func get_wall_routing_mode(object_data: Dictionary) -> String:\n\tif PassiveRouteServiceRef.is_passive_route(object_data):\n\t\treturn PassiveRouteServiceRef.get_mount_side(object_data)\n\treturn RouteRendererRef.normalize_wall_routing_mode(object_data)\n'
          if room.count(old_mode) != 1:
              raise SystemExit('room routing mode marker missing')
          room = room.replace(old_mode, new_mode, 1)
          old_draw = '''\tif get_wall_routing_mode(object_data) == "inner":
          \t\tfor side_key in ["wall_side_1", "wall_side_2"]:
          \t\t\tdraw_inner_wall_route_port(cell, object_data, str(object_data.get(side_key, "")), visual_center)
          \t\treturn true
          '''
          new_draw = '''\tif get_wall_routing_mode(object_data) == "inner":
          \t\tfor route_side in PassiveRouteServiceRef.get_route_sides(object_data):
          \t\t\tdraw_inner_wall_route_port(cell, object_data, route_side, visual_center)
          \t\treturn true
          '''
          if room.count(old_draw) != 1:
              raise SystemExit('inner route draw marker missing')
          room = room.replace(old_draw, new_draw, 1)
          old_faces = '''\tif get_wall_routing_mode(object_data) == "inner":
          \t\tfor side_key in ["wall_side_1", "wall_side_2"]:
          \t\t\tvar face: String = _wall_route_side_to_visible_face(str(object_data.get(side_key, "")))
          \t\t\tif not face.is_empty() and face not in faces:
          \t\t\t\tfaces.append(face)
          '''
          new_faces = '''\tif get_wall_routing_mode(object_data) == "inner":
          \t\tfor route_side in PassiveRouteServiceRef.get_route_sides(object_data):
          \t\t\tvar face: String = _wall_route_side_to_visible_face(route_side)
          \t\t\tif not face.is_empty() and face not in faces:
          \t\t\t\tfaces.append(face)
          '''
          if room.count(old_faces) != 1:
              raise SystemExit('cooling visible faces marker missing')
          room_path.write_text(room.replace(old_faces, new_faces, 1))

          route_path = Path('scripts/visual/renderer/route_renderer.gd')
          route = route_path.read_text()
          route_preload = 'class_name RouteRenderer\n'
          if 'PassiveRouteServiceRef' not in route:
              route = route.replace(route_preload, route_preload + '\nconst PassiveRouteServiceRef = preload("res://scripts/game/cooling/passive_route_service.gd")\n', 1)
          mode_marker = 'static func normalize_wall_routing_mode(object_data: Dictionary) -> String:\n'
          mode_start = route.index(mode_marker)
          body_start = mode_start + len(mode_marker)
          route = route[:body_start] + '\tif PassiveRouteServiceRef.is_passive_route(object_data):\n\t\treturn PassiveRouteServiceRef.get_mount_side(object_data)\n' + route[body_start:]
          route_path.write_text(route)
          PY
      - name: Commit route rendering
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/field/room_visual_renderer.gd scripts/visual/renderer/route_renderer.gd
          git commit -m "Render canonical passive route geometry"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
