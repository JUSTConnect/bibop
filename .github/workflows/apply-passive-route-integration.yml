name: Apply Passive Route Renderer

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-passive-route-renderer:
    if: github.event.pull_request.number == 1199
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch room visual renderer
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/field/room_visual_renderer.gd')
          text = path.read_text()
          preload = 'const WorldObjectCatalogRef = preload("res://scripts/world/world_object_catalog.gd")\n'
          if 'PassiveRouteServiceRef' not in text:
              if text.count(preload) != 1:
                  raise SystemExit('renderer catalog preload marker missing')
              text = text.replace(preload, preload + 'const PassiveRouteServiceRef = preload("res://scripts/game/cooling/passive_route_service.gd")\n', 1)

          sides_start = text.index('func _get_wall_routing_sides(')
          sides_end = text.index('\nfunc _get_wall_routing_face_offset_sign(', sides_start)
          sides_block = '''func _get_wall_routing_sides(object_data: Dictionary) -> Array[String]:
          \treturn PassiveRouteServiceRef.normalize_route_pair(PassiveRouteServiceRef.get_route_sides(object_data))
          '''
          text = text[:sides_start] + sides_block + text[sides_end:]

          face_start = text.index('func _get_wall_routing_face_offset_sign(')
          face_end = text.index('\nfunc _get_wall_routing_anchor_world(', face_start)
          face_block = '''func _get_wall_routing_face_offset_sign(object_data: Dictionary) -> float:
          \treturn 1.0 if PassiveRouteServiceRef.get_mount_side(object_data) == PassiveRouteServiceRef.MOUNT_INNER else -1.0
          '''
          text = text[:face_start] + face_block + text[face_end:]
          path.write_text(text)
          PY
      - name: Commit renderer integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/field/room_visual_renderer.gd
          git commit -m "Render canonical passive route geometry"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
