name: Integrate Versioned Migration Loader

on:
  pull_request:

permissions:
  contents: write

jobs:
  integrate-versioned-migration-loader:
    if: github.event.pull_request.number == 1202
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch load and save boundary
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          world_path = Path('scripts/world/world_state_store.gd')
          world = world_path.read_text()
          if world.count('const WORLD_SNAPSHOT_FORMAT_VERSION: int = 1') != 1:
              raise SystemExit('world snapshot version marker missing')
          world_path.write_text(world.replace('const WORLD_SNAPSHOT_FORMAT_VERSION: int = 1', 'const WORLD_SNAPSHOT_FORMAT_VERSION: int = 2', 1))

          mission_path = Path('scripts/game/mission_manager.gd')
          mission = mission_path.read_text()
          preload_marker = 'const PassiveRouteServiceRef = preload("res://scripts/game/routing/passive_route_service.gd")\n'
          preload_line = 'const VersionedSnapshotMigrationServiceRef = preload("res://scripts/world/versioned_snapshot_migration_service.gd")\n'
          if preload_line not in mission:
              if mission.count(preload_marker) != 1:
                  raise SystemExit('mission preload marker missing')
              mission = mission.replace(preload_marker, preload_marker + preload_line, 1)
          state_marker = 'var details_currency_service = DetailsCurrencyServiceRef.new()\n'
          state_line = 'var migrated_center_storage_state: Dictionary = {}\n'
          if state_line not in mission:
              if mission.count(state_marker) != 1:
                  raise SystemExit('mission state marker missing')
              mission = mission.replace(state_marker, state_marker + state_line, 1)

          block_pattern = r'func replace_world_state_snapshot\(objects: Array\[Dictionary\]\) -> Dictionary:\n.*?\nfunc _upsert_world_state_object'
          replacement = '''func replace_world_state_snapshot(objects: Array[Dictionary]) -> Dictionary:
          \treturn replace_world_state_serialized_snapshot({"format_version":0, "objects":objects.duplicate(true)})

          func preview_world_state_snapshot_migration(snapshot: Dictionary) -> Dictionary:
          \treturn VersionedSnapshotMigrationServiceRef.preview_migration(snapshot)

          func replace_world_state_serialized_snapshot(snapshot: Dictionary) -> Dictionary:
          \tvar migration: Dictionary = VersionedSnapshotMigrationServiceRef.migrate_document(snapshot)
          \tif not bool(migration.get("success", false)):
          \t\treturn migration
          \tvar canonical: Dictionary = Dictionary(migration.get("snapshot", {})).duplicate(true)
          \tvar raw_entities: Variant = canonical.get("entities", [])
          \tif not raw_entities is Array:
          \t\treturn {"ok":false, "success":false, "code":"invalid_document", "reason_code":"invalid_document", "details":{"field":"entities"}}
          \tvar entities: Array[Dictionary] = []
          \tfor entity_value in Array(raw_entities):
          \t\tif not entity_value is Dictionary:
          \t\t\treturn {"ok":false, "success":false, "code":"invalid_document", "reason_code":"invalid_document", "details":{"field":"entities", "reason":"entity_not_dictionary"}}
          \t\tentities.append(Dictionary(entity_value).duplicate(true))
          \tvar bounds_check: Dictionary = _validate_world_state_store_snapshot_bounds(entities)
          \tif not bool(bounds_check.get("ok", false)):
          \t\treturn bounds_check
          \tvar world_result: Dictionary = world_state_store.replace_serialized_snapshot(canonical)
          \tif not bool(world_result.get("ok", false)):
          \t\treturn world_result
          \tvar details_snapshot: Variant = canonical.get("details_currency", {})
          \tif details_snapshot is Dictionary and not Dictionary(details_snapshot).is_empty():
          \t\tdetails_currency_service.replace_snapshot(Dictionary(details_snapshot))
          \tvar migrated_inventory: Variant = canonical.get("inventory_state", {})
          \tif migrated_inventory is Dictionary:
          \t\tvar next_inventory: Dictionary = runtime_inventory_state.duplicate(true)
          \t\tfor key in Dictionary(migrated_inventory).keys():
          \t\t\tnext_inventory[key] = Dictionary(migrated_inventory)[key]
          \t\truntime_inventory_state = next_inventory
          \tvar center_storage: Variant = canonical.get("center_storage", {})
          \tif center_storage is Dictionary:
          \t\tmigrated_center_storage_state = Dictionary(center_storage).duplicate(true)
          \tvar result: Dictionary = world_result.duplicate(true)
          \tresult["migration"] = migration.duplicate(true)
          \tresult["migration_issues"] = Array(migration.get("issues", [])).duplicate(true)
          \tresult["source_format_version"] = int(migration.get("source_format_version", 0))
          \tresult["target_format_version"] = int(migration.get("target_format_version", VersionedSnapshotMigrationServiceRef.CURRENT_FORMAT_VERSION))
          \tresult["migrated"] = bool(migration.get("migrated", false))
          \tresult["draft_save_allowed"] = bool(migration.get("draft_save_allowed", false))
          \tresult["task_test_allowed"] = bool(migration.get("task_test_allowed", false))
          \tresult["promotion_allowed"] = bool(migration.get("promotion_allowed", false))
          \treturn result

          func get_world_state_serializable_snapshot() -> Dictionary:
          \tvar snapshot: Dictionary = world_state_store.get_serializable_snapshot()
          \tsnapshot["format_version"] = VersionedSnapshotMigrationServiceRef.CURRENT_FORMAT_VERSION
          \tsnapshot["details_currency"] = details_currency_service.get_snapshot()
          \tsnapshot["inventory_state"] = get_inventory_state()
          \tsnapshot["center_storage"] = migrated_center_storage_state.duplicate(true)
          \treturn snapshot

          func _upsert_world_state_object'''
          mission, count = re.subn(block_pattern, replacement, mission, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'mission snapshot block replaced {count}')
          mission_path.write_text(mission)

          static_path = Path('tools/check_binding_store.py')
          static = static_path.read_text()
          old_static = '("MissionManager legacy wrapper migrates", \'replace_serialized_snapshot({"format_version": 0, "objects": objects})\' in mission),'
          new_static = '("MissionManager legacy wrapper migrates", "replace_world_state_serialized_snapshot" in mission and "VersionedSnapshotMigrationServiceRef" in mission),'
          if static.count(old_static) != 1:
              raise SystemExit('binding static marker missing')
          static_path.write_text(static.replace(old_static, new_static, 1))

          test_path = Path('tools/ci/check_binding_store_mission_manager.gd')
          test = test_path.read_text()
          if 'VersionedSnapshotMigrationServiceRef' not in test:
              test = test.replace('const MissionManagerRef = preload("res://scripts/game/mission_manager.gd")\n', 'const MissionManagerRef = preload("res://scripts/game/mission_manager.gd")\nconst VersionedSnapshotMigrationServiceRef = preload("res://scripts/world/versioned_snapshot_migration_service.gd")\n', 1)
          test = test.replace('int(canonical_snapshot.get("format_version", 0)) == 1', 'int(canonical_snapshot.get("format_version", 0)) == VersionedSnapshotMigrationServiceRef.CURRENT_FORMAT_VERSION')
          test = test.replace('{"format_version": 1, "entities": "invalid", "bindings": []}', '{"format_version": VersionedSnapshotMigrationServiceRef.CURRENT_FORMAT_VERSION, "entities": "invalid", "bindings": []}')
          test = test.replace('str(malformed_result.get("code", "")) == "missing"', 'str(malformed_result.get("code", "")) == VersionedSnapshotMigrationServiceRef.CODE_INVALID_DOCUMENT')
          test_path.write_text(test)
          PY
      - name: Commit loader integration
        run: |
          rm -f .github/workflows/integrate-versioned-migration-loader.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/world/world_state_store.gd scripts/game/mission_manager.gd tools/check_binding_store.py tools/ci/check_binding_store_mission_manager.gd .github/workflows/integrate-versioned-migration-loader.yml
          git commit -m "Integrate versioned migration at snapshot load boundary"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
