name: Apply Reel Facade

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-reel-facade:
    if: github.event.pull_request.number == 1196
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch resolver and facade
        run: |
          python3 - <<'PY'
          from pathlib import Path

          service = Path('scripts/game/power_cable_reel_service.gd')
          text = service.read_text()
          old = '''\tvar recalculation: Dictionary = recalculate_world(objects, reel_id, blocked_cells)
          \trecalculation["preview"] = false
          \trecalculation["action"] = action.strip_edges().to_lower()
          \trecalculation["action_code"] = str(preview.get("code", ""))
          \treturn recalculation
          '''
          new = '''\tvar recalculation: Dictionary = recalculate_world(objects, reel_id, blocked_cells)
          \tvar resolution_success: bool = bool(recalculation.get("success", false))
          \tvar resolution_code: String = str(recalculation.get("code", ""))
          \trecalculation["preview"] = false
          \trecalculation["action"] = action.strip_edges().to_lower()
          \trecalculation["action_code"] = str(preview.get("code", ""))
          \trecalculation["resolution_success"] = resolution_success
          \trecalculation["resolution_code"] = resolution_code
          \trecalculation["success"] = true
          \trecalculation["ok"] = true
          \trecalculation["code"] = str(preview.get("code", CODE_VALID))
          \trecalculation["reason_code"] = str(preview.get("reason_code", recalculation.get("code", CODE_VALID)))
          \treturn recalculation
          '''
          if text.count(old) != 1:
              raise SystemExit('service action marker missing')
          service.write_text(text.replace(old, new, 1))

          facade = Path('scripts/game/bipob_cable_runtime_service.gd')
          text = facade.read_text()
          preload_old = 'const CableRuntimeStateRef = preload("res://scripts/game/bipob_cable_runtime_state.gd")\n'
          preload_new = preload_old + 'const PowerCableReelServiceRef = preload("res://scripts/game/power_cable_reel_service.gd")\n'
          if text.count(preload_old) != 1:
              raise SystemExit('facade preload marker missing')
          text = text.replace(preload_old, preload_new, 1)
          marker = '''static func create_empty_state() -> BipobCableRuntimeState:
          \tvar result: BipobCableRuntimeState = CableRuntimeStateRef.new()
          \treturn result
          '''
          methods = marker + '''
          static func preview_power_cable_reel_action(objects: Array[Dictionary], reel_id: String, action: String, parameters: Dictionary = {}, blocked_cells: Array[Vector2i] = []) -> Dictionary:
          \treturn PowerCableReelServiceRef.preview_action(objects, reel_id, action, parameters, blocked_cells)

          static func apply_power_cable_reel_action(objects: Array[Dictionary], reel_id: String, action: String, parameters: Dictionary = {}, blocked_cells: Array[Vector2i] = []) -> Dictionary:
          \treturn PowerCableReelServiceRef.apply_action_to_world(objects, reel_id, action, parameters, blocked_cells)

          static func recalculate_power_cable_reel(objects: Array[Dictionary], reel_id: String, blocked_cells: Array[Vector2i] = []) -> Dictionary:
          \treturn PowerCableReelServiceRef.recalculate_world(objects, reel_id, blocked_cells)

          static func recalculate_power_cable_reels_for_socket(objects: Array[Dictionary], socket_id: String, blocked_cells: Array[Vector2i] = []) -> Dictionary:
          \treturn PowerCableReelServiceRef.recalculate_for_socket(objects, socket_id, blocked_cells)
          '''
          if text.count(marker) != 1:
              raise SystemExit('facade method marker missing')
          facade.write_text(text.replace(marker, methods, 1))
          PY
      - name: Commit and remove workflow
        run: |
          rm -f .github/workflows/apply-reel-facade.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/game/power_cable_reel_service.gd scripts/game/bipob_cable_runtime_service.gd .github/workflows/apply-reel-facade.yml
          git commit -m "Integrate power cable reel resolver facade"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
