name: Apply Reel Catalog Contract

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-reel-catalog:
    if: github.event.pull_request.number == 1196
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Replace reel catalog definition
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/world/world_object_catalog.gd')
          lines = path.read_text().splitlines()
          matches = [index for index, line in enumerate(lines) if line.startswith('\t"power_cable_reel": {')]
          if len(matches) != 1:
              raise SystemExit(f'expected one reel definition, found {len(matches)}')
          index = matches[0]
          replacement = [
              '\t"power_cable_reel": {',
              '\t\t"entity_contract":{"scope":"entity", "entity_type":"item", "entity_subtype":"power_cable_reel", "status_profile":"item_standard", "property_profile":"fixed", "interaction_profile":"item", "notification_profile":"standard_action", "power_profile":"none", "control_profile":"none", "access_profile":"none", "binding_profile":"none", "runtime_presentation_profile":"standard_item", "editor_presentation_profile":"excluded", "validation_fixture":"default", "capabilities":{"state":true, "power":false, "health":true, "energy":false, "overheat":false, "control":false, "access":false, "bindings":false, "mount":false, "side":false, "routing":true, "test_override":false}},',
              '\t\t"group":"item", "object_group":"item", "object_type":"power_cable_reel", "name":"Power Cable Reel", "runtime_power_profile":"power_cable_reel", "runtime_reel_feed_only":true, "placement_surfaces":["floor"], "default_placement_surface":"floor", "requires_floor_anchor_when_wall_mounted":false, "placement_mode":"item", "state":"disconnected", "health_state":"healthy", "item_form":"physical", "storage_type":"pocket", "can_connect_socket":true, "max_cable_length":5,',
              '\t\t"end_1":{"state":"on_reel", "target_id":""}, "end_2":{"state":"on_reel", "target_id":""}, "path_cells":[], "connection_state":"disconnected", "reconnect_required":false,',
              '\t\t"end_1_state":"on_reel", "end_1_target_id":"", "end_2_state":"on_reel", "end_2_target_id":"", "cable_path_cells":[], "cable_length":0, "is_connected":false, "connected":false, "disconnected":true, "connected_side_1":false, "connected_side_2":false, "cut":false, "damaged":false, "broken":false',
              '\t},',
          ]
          lines[index:index + 1] = replacement
          path.write_text('\n'.join(lines) + '\n')
          PY
      - name: Commit and remove workflow
        run: |
          rm -f .github/workflows/apply-reel-catalog.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/world/world_object_catalog.gd .github/workflows/apply-reel-catalog.yml
          git commit -m "Define canonical power cable reel entity contract"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
