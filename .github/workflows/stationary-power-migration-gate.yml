name: Stationary Power Migration Gate

on:
  pull_request:
    paths:
      - scripts/world/stationary_power_entity_catalog.gd
      - scripts/world/world_object_catalog.gd
      - scripts/world/entity_contract_fixtures.gd
      - scripts/world/entity_definition_contract.gd
      - scripts/world/entity_status_evaluator.gd
      - scripts/world/power_control_resolver.gd
      - scripts/game/power/stationary_power_action_service.gd
      - tools/ci/check_stationary_power_*.gd
      - .github/workflows/stationary-power-migration-gate.yml
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  stationary-power-migration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/power-entities-1181
          fetch-depth: 0

      - name: Apply legacy adapter correction
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/world/stationary_power_entity_catalog.gd")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              '"damaged", "broken", "destroyed", "cut", "is_on", "switch_state",',
              '"damaged", "broken", "destroyed", "cut", "is_on", "switch_state", "fuse_present", "fuse_installed",',
              1,
          )
          old = '''static func adapt_legacy_read_only(record: Dictionary) -> Dictionary:
	var source_before: Dictionary = record.duplicate(true)
	var token: String = str(record.get("map_constructor_prefab_id", record.get("legacy_prefab_id", record.get("archetype_id", record.get("object_type", ""))))).strip_edges().to_lower()
	var result: Dictionary = normalize_new_record(record, token)
	result["legacy_adapter"] = true
	result["legacy_source_unchanged"] = record == source_before
	return result'''
          new = '''static func adapt_legacy_read_only(record: Dictionary) -> Dictionary:
	var source_before: Dictionary = record.duplicate(true)
	var token: String = str(record.get("map_constructor_prefab_id", record.get("legacy_prefab_id", record.get("archetype_id", record.get("object_type", ""))))).strip_edges().to_lower()
	var adapted_source: Dictionary = record.duplicate(true)
	_apply_legacy_axis_values(adapted_source, canonical_id(token))
	var result: Dictionary = normalize_new_record(adapted_source, token)
	result["legacy_adapter"] = true
	result["legacy_source_unchanged"] = record == source_before
	return result'''
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit("legacy adapter anchor missing")
          path.write_text(text, encoding="utf-8")
          PY
          if ! git diff --quiet -- scripts/world/stationary_power_entity_catalog.gd; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/world/stationary_power_entity_catalog.gd
            git commit -m "fix(power): preserve legacy health before canonical defaults"
            git push origin HEAD:feature/power-entities-1181
          fi

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - name: Import project
        run: godot --headless --quiet --path . --import

      - name: Canonical definitions and legacy adapter
        id: definitions
        continue-on-error: true
        shell: bash
        run: |
          set +e
          godot --headless --quiet --path . --script res://tools/ci/check_stationary_power_definitions.gd 2>&1 | tee /tmp/stationary-definitions.log
          code=${PIPESTATUS[0]}
          {
            echo 'report<<EOF'
            grep -E 'STATIONARY_POWER_|SCRIPT ERROR|ERROR:' /tmp/stationary-definitions.log | tail -80 || true
            echo EOF
          } >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Physical topology and source resolution
        id: topology
        continue-on-error: true
        shell: bash
        run: |
          set +e
          godot --headless --quiet --path . --script res://tools/ci/check_stationary_power_topology.gd 2>&1 | tee /tmp/stationary-topology.log
          code=${PIPESTATUS[0]}
          {
            echo 'report<<EOF'
            grep -E 'STATIONARY_POWER_|SCRIPT ERROR|ERROR:' /tmp/stationary-topology.log | tail -80 || true
            echo EOF
          } >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Player actions and autonomous notifications
        id: actions
        continue-on-error: true
        shell: bash
        run: |
          set +e
          godot --headless --quiet --path . --script res://tools/ci/check_stationary_power_actions.gd 2>&1 | tee /tmp/stationary-actions.log
          code=${PIPESTATUS[0]}
          {
            echo 'report<<EOF'
            grep -E 'STATIONARY_POWER_|SCRIPT ERROR|ERROR:' /tmp/stationary-actions.log | tail -80 || true
            echo EOF
          } >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Report focused failures
        if: github.event_name == 'pull_request' && (steps.definitions.outcome == 'failure' || steps.topology.outcome == 'failure' || steps.actions.outcome == 'failure')
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          DEFINITIONS_REPORT: ${{ steps.definitions.outputs.report }}
          TOPOLOGY_REPORT: ${{ steps.topology.outputs.report }}
          ACTIONS_REPORT: ${{ steps.actions.outputs.report }}
        shell: bash
        run: |
          {
            echo '### Stationary Power Migration diagnostics'
            echo
            echo '```text'
            printf '%s\n' "$DEFINITIONS_REPORT"
            printf '%s\n' "$TOPOLOGY_REPORT"
            printf '%s\n' "$ACTIONS_REPORT"
            echo '```'
          } > /tmp/stationary-power-comment.md
          gh pr comment "$PR_URL" --body-file /tmp/stationary-power-comment.md
          exit 1
