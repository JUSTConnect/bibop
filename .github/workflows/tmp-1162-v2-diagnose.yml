name: Validate issue 1162 final files

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  validate-final-files:
    if: github.event.pull_request.head.ref == 'codex/bip-architecture-coordinators-02f7-final-cleanup-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02f7-final-cleanup-v2
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - name: Reconstruct and validate final files
        shell: bash
        run: bash .github/issue-1162-v2/finalize.sh
      - name: Upload validated final files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1162-validated-final-files
          path: |
            /tmp/issue-1162-final-files.tar.gz
            /tmp/issue-1162-final-files.sha256
            /tmp/issue-1162-finalize.log
          if-no-files-found: warn
          retention-days: 2
      - name: Publish clean non-workflow source files
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          expected=$(cat <<'EOF'
          docs/ARCHITECTURE.md
          docs/room_visual_renderer_component_map.md
          scripts/field/room_visual_renderer.gd
          tools/check_cable_canvas_renderer_boundary.py
          tools/check_iso_asset_alignment_policy_boundary.py
          tools/check_room_visual_renderer_component_boundary.py
          tools/check_visual_asset_resource_runtime_boundary.py
          tools/ci/check_room_visual_renderer_smoke_contract.gd
          EOF
          )
          git add -- $expected
          git clean -fdx
          actual=$(git diff --cached --name-only | sort)
          test "$actual" = "$(printf '%s\n' "$expected" | sort)"
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git commit -m 'BIP-Architecture-Coordinators-02F7: Finalize RoomVisualRenderer decomposition'
          git push origin HEAD:refs/heads/codex/bip-architecture-coordinators-02f7-final-source-v2
