name: Validate issue 1162 final files

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  validate-final-files:
    if: github.event.pull_request.head.ref == 'codex/bip-architecture-coordinators-02f7-final-cleanup-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02f7-final-cleanup-v2
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - name: Reconstruct and validate final files
        shell: bash
        run: bash .github/issue-1162-v2/finalize.sh
      - name: Upload validated final files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1162-validated-final-files
          path: |
            /tmp/issue-1162-final-files.tar.gz
            /tmp/issue-1162-final-files.sha256
            /tmp/issue-1162-finalize.log
          if-no-files-found: warn
          retention-days: 2
