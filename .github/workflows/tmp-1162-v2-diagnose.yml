name: Diagnose issue 1162 archive

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'codex/bip-architecture-coordinators-02f7-final-cleanup-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02f7-final-cleanup-v2
          fetch-depth: 1
      - name: Diagnose archive
        shell: bash
        run: |
          exec > >(tee /tmp/issue-1162-archive-diagnostics.txt) 2>&1
          set +e
          echo '== file sizes =='
          wc -c .github/issue-1162-v2/*.b64
          echo '== file checksums =='
          sha256sum .github/issue-1162-v2/*.b64
          echo '== concatenate =='
          cat \
            .github/issue-1162-v2/part00.b64 \
            .github/issue-1162-v2/combo01.b64 \
            .github/issue-1162-v2/restA.b64 \
            .github/issue-1162-v2/restB.b64 \
            > /tmp/issue-1162-source.b64
          concat_status=$?
          wc -c /tmp/issue-1162-source.b64
          sha256sum /tmp/issue-1162-source.b64
          echo "concat_status=$concat_status"
          echo '== base64 decode =='
          base64 --decode /tmp/issue-1162-source.b64 > /tmp/issue-1162-source.tar.gz
          decode_status=$?
          ls -l /tmp/issue-1162-source.tar.gz
          sha256sum /tmp/issue-1162-source.tar.gz
          echo "decode_status=$decode_status"
          echo '== gzip test =='
          gzip -tv /tmp/issue-1162-source.tar.gz
          gzip_status=$?
          echo "gzip_status=$gzip_status"
          echo '== tar list =='
          tar -tzvf /tmp/issue-1162-source.tar.gz
          tar_status=$?
          echo "tar_status=$tar_status"
          test "$concat_status" -eq 0
          test "$decode_status" -eq 0
          test "$gzip_status" -eq 0
          test "$tar_status" -eq 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1162-v2-archive-diagnostics
          path: /tmp/issue-1162-archive-diagnostics.txt
          if-no-files-found: error
          retention-days: 2
