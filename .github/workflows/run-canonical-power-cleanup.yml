name: Run Canonical Power Cleanup
on: pull_request
permissions:
  contents: write
jobs:
  apply:
    if: github.event.pull_request.number == 1203
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/finalize-canonical-runtime
      - run: python3 tools/apply_canonical_power_cleanup.py
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add scripts/world/power_system.gd scripts/game/bipob_cable_runtime_service.gd
          git commit -m 'Use computed power source fields at runtime'
          git push
