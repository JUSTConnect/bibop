name: Versioned Migration V2 Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  versioned-migration-v2:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Static architecture gate
        run: |
          git diff --check
          python tools/check_versioned_snapshot_migration.py

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false

      - name: Godot import smoke
        run: godot --headless --path . --import

      - name: Versioned migration behavior gate
        run: timeout 120s godot --headless --path . --script res://tools/ci/check_versioned_snapshot_migration.gd

      - name: MissionManager migration integration gate
        run: timeout 120s godot --headless --path . --script res://tools/ci/check_versioned_snapshot_migration_mission_manager.gd

      - name: Map Constructor preset migration gate
        run: timeout 120s godot --headless --path . --script res://tools/ci/check_versioned_map_constructor_preset.gd
