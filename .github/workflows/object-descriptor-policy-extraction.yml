name: Object Descriptor Extraction

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02d-object-descriptor-policy
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python tools/apply_object_descriptor_policy_extraction.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/visual/renderer/object_renderer.gd scripts/field/room_visual_renderer.gd tools/ci/check_object_renderer_contract.gd tools/check_room_visual_renderer_component_boundary.py
          git diff --cached --quiet && exit 0
          git commit -m 'Extract object descriptor policy'
          git push origin HEAD:codex/bip-architecture-coordinators-02d-object-descriptor-policy
