name: Apply Passive Route Presentation

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-passive-route-presentation:
    if: github.event.pull_request.number == 1200
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Migrate inspector validation and renderer
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one marker, found {count}')
              return text.replace(old, new, 1)

          inspector_path = Path('scripts/ui/map_constructor/map_constructor_inspector.gd')
          inspector = inspector_path.read_text()
          inspector = replace_once(
              inspector,
              'const CoolingRoutingContourServiceRef = preload("res://scripts/game/cooling/cooling_routing_contour_service.gd")\n',
              'const PassiveRouteServiceRef = preload("res://scripts/game/routing/passive_route_service.gd")\n',
              'inspector passive preload'
          )
          helper_pattern = r'static func _is_cooling_routing_object\(data: Dictionary\) -> bool:\n.*?\nstatic func _is_bipob_constructor_object'
          helper_replacement = '''static func _is_cooling_routing_object(data: Dictionary) -> bool:
          \treturn PassiveRouteServiceRef.is_passive_route(data)


          static func _normalize_cooling_routing_kind(data: Dictionary) -> String:
          \treturn PassiveRouteServiceRef.get_kind(data)


          static func _format_cooling_routing_kind(kind: String) -> String:
          \tif kind == PassiveRouteServiceRef.KIND_AIR_DUCT:
          \t\treturn "air duct"
          \tif kind == PassiveRouteServiceRef.KIND_WATER_PIPE:
          \t\treturn "water pipe"
          \treturn "unknown"


          static func _normalize_cooling_wall_side(data: Dictionary, field_name: String, fallback: String) -> String:
          \tvar side: String = PassiveRouteServiceRef.normalize_side(data.get(field_name, fallback))
          \treturn fallback if side.is_empty() else side


          static func _is_bipob_constructor_object'''
          inspector, count = re.subn(helper_pattern, helper_replacement, inspector, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'inspector helpers replaced {count}')

          objects_pattern = r'static func _get_cooling_objects_by_id\(ui: Variant, selected_entity_id: String, selected_data: Dictionary\) -> Dictionary:\n.*?\n\treturn objects_by_id\n'
          objects_replacement = '''static func _get_cooling_objects_by_id(ui: Variant, selected_entity_id: String, selected_data: Dictionary) -> Dictionary:
          \tvar objects_by_id: Dictionary = {}
          \tif ui.mission_manager_runtime != null:
          \t\tvar mission_objects: Variant = ui.mission_manager_runtime.get("mission_world_objects")
          \t\tif mission_objects is Array:
          \t\t\tfor object_variant in Array(mission_objects):
          \t\t\t\tvar object_data: Dictionary = ui._safe_ui_dictionary(object_variant)
          \t\t\t\tvar object_id: String = ui._safe_ui_string(object_data.get("id", object_data.get("object_id", ""))).strip_edges()
          \t\t\t\tif object_id.is_empty() or not PassiveRouteServiceRef.is_passive_route(object_data):
          \t\t\t\t\tcontinue
          \t\t\t\tobjects_by_id[object_id] = object_data.duplicate(true)
          \tobjects_by_id[selected_entity_id] = selected_data.duplicate(true)
          \treturn objects_by_id
          '''
          inspector, count = re.subn(objects_pattern, objects_replacement, inspector, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'inspector object collection replaced {count}')

          controls_pattern = r'static func _render_cooling_system_controls\(ui: Variant, parent: VBoxContainer, entity_kind: String, entity_id: String, data: Dictionary\) -> void:\n.*?\nstatic func _is_wall_cable_constructor_object'
          controls_replacement = '''static func _render_cooling_system_controls(ui: Variant, parent: VBoxContainer, entity_kind: String, entity_id: String, data: Dictionary) -> void:
          \tvar side_options: Array[Dictionary] = [
          \t\t{"label":"NE", "value":"NE"},
          \t\t{"label":"SE", "value":"SE"},
          \t\t{"label":"SW", "value":"SW"},
          \t\t{"label":"NW", "value":"NW"}
          \t]
          \tMapConstructorPropertyControls.add_enum_property(ui, parent, "Mount side", entity_kind, entity_id, "mount_side", _normalize_cooling_wall_side(data, "mount_side", "SW"), side_options)
          \tMapConstructorPropertyControls.add_enum_property(ui, parent, "Route side 1", entity_kind, entity_id, "route_side_1", _normalize_cooling_wall_side(data, "route_side_1", "NW"), side_options)
          \tMapConstructorPropertyControls.add_enum_property(ui, parent, "Route side 2", entity_kind, entity_id, "route_side_2", _normalize_cooling_wall_side(data, "route_side_2", "SE"), side_options)

          \tvar objects_by_id: Dictionary = _get_cooling_objects_by_id(ui, entity_id, data)
          \tvar route_objects: Array[Dictionary] = []
          \tvar object_ids: Array = objects_by_id.keys()
          \tobject_ids.sort()
          \tfor object_id_variant in object_ids:
          \t\tvar object_value: Variant = objects_by_id[object_id_variant]
          \t\tif object_value is Dictionary:
          \t\t\tvar route_object: Dictionary = Dictionary(object_value).duplicate(true)
          \t\t\tif str(route_object.get("id", "")).strip_edges().is_empty():
          \t\t\t\troute_object["id"] = str(object_id_variant)
          \t\t\troute_objects.append(route_object)
          \tvar topology: Dictionary = PassiveRouteServiceRef.build_topology(route_objects)
          \tvar preview: Dictionary = Dictionary(Dictionary(topology.get("previews", {})).get(entity_id, PassiveRouteServiceRef.validate_segment(data)))
          \tvar pair_labels: Array[String] = []
          \tfor side_variant in Array(preview.get("route_pair", [])):
          \t\tpair_labels.append(str(side_variant))
          \tvar neighbor_labels: Array[String] = []
          \tfor neighbor_variant in Array(preview.get("compatible_neighbor_ids", [])):
          \t\tneighbor_labels.append(str(neighbor_variant))
          \tvar issue_lines: Array[String] = []
          \tfor issue_variant in Array(preview.get("issues", [])):
          \t\tif not issue_variant is Dictionary:
          \t\t\tcontinue
          \t\tvar issue: Dictionary = Dictionary(issue_variant)
          \t\tissue_lines.append("[%s] %s" % [str(issue.get("code", "unknown")), str(issue.get("message", ""))])
          \tvar pair_text: String = "invalid"
          \tif pair_labels.size() == 2:
          \t\tpair_text = "%s + %s" % [pair_labels[0], pair_labels[1]]
          \tvar neighbor_text: String = "none"
          \tif not neighbor_labels.is_empty():
          \t\tneighbor_text = ", ".join(neighbor_labels)
          \tvar issue_text: String = "none"
          \tif not issue_lines.is_empty():
          \t\tissue_text = "\n".join(issue_lines)
          \tvar component_id: String = str(preview.get("component_id", ""))
          \tif component_id.is_empty():
          \t\tcomponent_id = "none"
          \t_add_read_only_text_row(ui, parent, "Routing kind", _format_cooling_routing_kind(str(preview.get("routing_kind", ""))))
          \t_add_read_only_text_row(ui, parent, "Normalized route pair", pair_text)
          \t_add_read_only_text_row(ui, parent, "Route shape", str(preview.get("route_shape", "invalid")))
          \t_add_read_only_text_row(ui, parent, "Compatible neighbors", neighbor_text)
          \t_add_read_only_text_row(ui, parent, "Computed component id", component_id)
          \t_add_read_only_text_row(ui, parent, "Route issues", issue_text)

          static func _is_wall_cable_constructor_object'''
          inspector, count = re.subn(controls_pattern, controls_replacement, inspector, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'inspector controls replaced {count}')
          inspector_path.write_text(inspector)

          validation_path = Path('scripts/game/map_constructor_validation_service.gd')
          validation = validation_path.read_text()
          validation = replace_once(
              validation,
              'const CoolingRoutingContourServiceRef = preload("res://scripts/game/cooling/cooling_routing_contour_service.gd")\n',
              'const PassiveRouteServiceRef = preload("res://scripts/game/routing/passive_route_service.gd")\n',
              'validation passive preload'
          )
          validation_pattern = r'\n\tvar contour_objects_by_id: Dictionary = \{\}.*?\n\t_get_power_link_validation_rules\(\)\.append_key_door_link_issues'
          validation_replacement = '''
          \tvar passive_route_issues: Dictionary = PassiveRouteServiceRef.collect_issues(manager.mission_world_objects)
          \tfor route_object_id in passive_route_issues.keys():
          \t\tvar route_object_data: Dictionary = manager.get_world_object_by_id(str(route_object_id))
          \t\tvar route_cell: Vector2i = manager._deserialize_cell_variant(route_object_data.get("position", Vector2i(-1, -1)))
          \t\tvar route_issue_index: int = 0
          \t\tfor route_issue_variant in Array(passive_route_issues[route_object_id]):
          \t\t\tif not route_issue_variant is Dictionary:
          \t\t\t\tcontinue
          \t\t\tvar route_issue: Dictionary = Dictionary(route_issue_variant)
          \t\t\tvar route_code: String = str(route_issue.get("code", "unknown"))
          \t\t\tvar route_severity: String = str(route_issue.get("severity", "warning"))
          \t\t\tissues.append(_make_map_constructor_issue("passive_route_%s_%s_%d" % [str(route_object_id), route_code, route_issue_index], route_severity, str(route_issue.get("message", "Passive route issue.")), route_cell, source_name, "world_object", str(route_object_id), "Adjust mount side or the two physical route ports."))
          \t\t\troute_issue_index += 1
          \t_get_power_link_validation_rules().append_key_door_link_issues'''
          validation, count = re.subn(validation_pattern, validation_replacement, validation, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'validation route block replaced {count}')
          validation_path.write_text(validation)

          renderer_path = Path('scripts/field/room_visual_renderer.gd')
          renderer = renderer_path.read_text()
          renderer = replace_once(
              renderer,
              'const WallRoutingValidationServiceRef = preload("res://scripts/game/routing/wall_routing_validation_service.gd")\n',
              'const WallRoutingValidationServiceRef = preload("res://scripts/game/routing/wall_routing_validation_service.gd")\nconst PassiveRouteServiceRef = preload("res://scripts/game/routing/passive_route_service.gd")\n',
              'renderer passive preload'
          )
          renderer = replace_once(
              renderer,
              '''func draw_wall_routing_utility(cell: Vector2i, object_data: Dictionary, visual_center: Vector2) -> bool:
          \tif not is_wall_routing_utility_object(object_data):
          \t\treturn false
          \tif is_authored_cooling_wall_canvas_object(object_data):
          \t\tvar faces: Array[String] = get_cooling_wall_canvas_visible_faces(object_data)
          \t\treturn draw_cooling_wall_canvas_asset_for_faces(cell, object_data, faces)
          \tif get_wall_routing_mode(object_data) == "inner":
          \t\tfor side_key in ["wall_side_1", "wall_side_2"]:
          \t\t\tdraw_inner_wall_route_port(cell, object_data, str(object_data.get(side_key, "")), visual_center)
          \t\treturn true
          \treturn draw_outer_wall_route_surface(cell, object_data, visual_center)
          ''',
              '''func draw_wall_routing_utility(cell: Vector2i, object_data: Dictionary, visual_center: Vector2) -> bool:
          \tif not is_wall_routing_utility_object(object_data):
          \t\treturn false
          \tvar render_snapshot: Dictionary = PassiveRouteServiceRef.get_render_snapshot(object_data)
          \tif is_authored_cooling_wall_canvas_object(object_data):
          \t\tvar faces: Array[String] = get_cooling_wall_canvas_visible_faces(object_data)
          \t\treturn draw_cooling_wall_canvas_asset_for_faces(cell, object_data, faces)
          \tif str(render_snapshot.get("route_mode", "inner")) == PassiveRouteServiceRef.MODE_INNER:
          \t\tfor side_variant in Array(render_snapshot.get("route_pair", [])):
          \t\t\tdraw_inner_wall_route_port(cell, object_data, str(side_variant), visual_center)
          \t\treturn true
          \treturn draw_outer_wall_route_surface(cell, object_data, visual_center)
          ''',
              'renderer utility draw'
          )
          renderer = renderer.replace('(object_type == "external_air_duct" and routing_kind == "air_duct" and asset_id == "air_duct_inner_wall_01")', '(object_type in ["external_air_duct", "air_duct"] and routing_kind == "air_duct" and asset_id == "air_duct_inner_wall_01")')
          renderer = renderer.replace('(object_type == "external_water_pipe" and routing_kind == "water_pipe" and asset_id == "water_pipe_inner_wall_01")', '(object_type in ["external_water_pipe", "water_pipe"] and routing_kind == "water_pipe" and asset_id == "water_pipe_inner_wall_01")')
          faces_pattern = r'func get_cooling_wall_canvas_visible_faces\(object_data: Dictionary\) -> Array\[String\]:\n.*?\n\treturn faces\n'
          faces_replacement = '''func get_cooling_wall_canvas_visible_faces(object_data: Dictionary) -> Array[String]:
          \tvar faces: Array[String] = []
          \tvar render_snapshot: Dictionary = PassiveRouteServiceRef.get_render_snapshot(object_data)
          \tfor side_variant in Array(render_snapshot.get("route_pair", [])):
          \t\tvar face: String = _wall_route_side_to_visible_face(str(side_variant))
          \t\tif not face.is_empty() and face not in faces:
          \t\t\tfaces.append(face)
          \tif faces.is_empty():
          \t\tvar mount_face: String = _wall_route_side_to_visible_face(str(render_snapshot.get("mount_side", "SW")))
          \t\tif not mount_face.is_empty():
          \t\t\tfaces.append(mount_face)
          \treturn faces
          '''
          renderer, count = re.subn(faces_pattern, faces_replacement, renderer, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'renderer faces replaced {count}')
          renderer_path.write_text(renderer)

          object_renderer_path = Path('scripts/visual/renderer/object_renderer.gd')
          object_renderer = object_renderer_path.read_text()
          object_renderer = object_renderer.replace('object_type in ["external_air_duct", "external_water_pipe"]', 'object_type in ["external_air_duct", "external_water_pipe", "air_duct", "water_pipe"]')
          object_renderer_path.write_text(object_renderer)
          PY
      - name: Commit presentation migration
        run: |
          rm -f .github/workflows/apply-passive-route-presentation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/ui/map_constructor/map_constructor_inspector.gd scripts/game/map_constructor_validation_service.gd scripts/field/room_visual_renderer.gd scripts/visual/renderer/object_renderer.gd .github/workflows/apply-passive-route-presentation.yml
          git commit -m "Use passive route previews in editor and renderer"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
