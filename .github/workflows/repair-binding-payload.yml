name: Repair BindingStore Payload

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair-binding-payload:
    if: github.event.pull_request.number == 1195
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Repair one missing Base64 character
        run: |
          python3 -c "from pathlib import Path; p=Path('.github/binding-store-payload/world_state_store.gd.gz.b64'); s=''.join(p.read_text().split()); p.write_text(s[:3167]+'L'+s[3167:]+'\n')"
      - name: Commit repair and remove this workflow
        run: |
          rm -f .github/workflows/repair-binding-payload.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github
          git commit -m "Repair BindingStore source payload"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
