name: Module Catalog Contract Diagnostic

on:
  pull_request:

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - name: Import project
        run: godot --headless --path . --import
      - name: Run contract
        continue-on-error: true
        run: godot --headless --path . --script res://tools/ci/check_bipob_module_catalog_factory.gd > module-catalog-contract.log 2>&1
      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-catalog-contract-output
          path: module-catalog-contract.log
