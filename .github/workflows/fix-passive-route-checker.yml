name: Fix Passive Route Checker

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-passive-route-checker:
    if: github.event.pull_request.number == 1200
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Scope checker to passive definitions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/check_cooling_routing_contours.py')
          text = path.read_text()
          text = text.replace('catalog = (root / "scripts/world/world_object_catalog.gd").read_text()\n', 'catalog = (root / "scripts/world/world_object_catalog.gd").read_text()\nroute_start = catalog.index(\'\\t"external_air_duct": {\')\nroute_end = catalog.index(\'\\t"external_wall": {\', route_start)\nroute_catalog = catalog[route_start:route_end]\n')
          text = text.replace('not any(token in catalog for token in forbidden_catalog_tokens)', 'not any(token in route_catalog for token in forbidden_catalog_tokens)')
          text = text.replace('\'"entity_subtype":"air_duct"\' in catalog and \'"entity_subtype":"water_pipe"\' in catalog', '\'"entity_subtype":"air_duct"\' in route_catalog and \'"entity_subtype":"water_pipe"\' in route_catalog')
          text = text.replace('\'"entity_subtype":"air_duct"\' in catalog and \'"test_override":false\' in catalog', 'route_catalog.count(\'"test_override":false\') == 2 and \'"test_override":true\' not in route_catalog')
          text = text.replace('all(f\'"field":"{field}"\' in catalog for field in ["mount_side", "route_side_1", "route_side_2"])', 'all(f\'"field":"{field}"\' in route_catalog for field in ["mount_side", "route_side_1", "route_side_2"])')
          path.write_text(text)
          PY
      - name: Commit checker fix
        run: |
          rm -f .github/workflows/fix-passive-route-checker.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/check_cooling_routing_contours.py .github/workflows/fix-passive-route-checker.yml
          git commit -m "Scope passive route static checks"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
