name: Apply RoomVisualRenderer Stage 1

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02d-renderer-components
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply projection and draw-entry extraction
        run: |
          python tools/apply_renderer_projection_extraction.py
          python tools/apply_renderer_draw_entry_extraction.py
          python tools/check_room_visual_renderer_component_boundary.py
      - name: Commit generated renderer migration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/field/room_visual_renderer.gd
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Extract renderer projection and draw-entry contracts [generated]'
          git push origin HEAD:codex/bip-architecture-coordinators-02d-renderer-components
