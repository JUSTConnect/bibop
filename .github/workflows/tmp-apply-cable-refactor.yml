name: Temporary Apply Cable Refactor

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02f5d-cable-canvas
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - name: Apply focused cable migration
        run: python tools/tmp_apply_cable_refactor.py
      - name: Check renderer component boundary
        run: python tools/check_room_visual_renderer_component_boundary.py
      - name: Check CableCanvasRenderer boundary
        run: python tools/check_cable_canvas_renderer_boundary.py
      - name: Import project
        run: godot --headless --path . --import
      - name: Check RouteRenderer contract
        run: godot --headless --path . --script res://tools/ci/check_route_renderer_contract.gd
      - name: Check CableCanvasRenderer contract
        run: godot --headless --path . --script res://tools/ci/check_cable_canvas_renderer_contract.gd
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: codex/bip-architecture-coordinators-02f5d-cable-canvas
          commit_message: BIP-Architecture-Coordinators-02F5D: Extract cable Canvas policy
