name: Passive Route Integration Debug

on:
  pull_request:

jobs:
  debug-integration:
    if: github.event.pull_request.number == 1200
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - run: godot --headless --path . --import
      - name: Capture integration log
        run: |
          mkdir -p /tmp/passive-route-integration
          set +e
          timeout 90s godot --headless --path . --script res://tools/ci/check_passive_route_integration.gd > /tmp/passive-route-integration/output.log 2>&1
          echo $? > /tmp/passive-route-integration/exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: passive-route-integration-log
          path: /tmp/passive-route-integration
          if-no-files-found: error
