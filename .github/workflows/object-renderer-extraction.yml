name: ObjectRenderer Policy Extraction

on:
  pull_request:

permissions:
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02d-object-policy
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply extraction
        run: python tools/extract_object_renderer_policy.py
      - name: Commit extraction
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/field/room_visual_renderer.gd scripts/visual/renderer/object_renderer.gd tools/check_room_visual_renderer_component_boundary.py tools/ci/check_object_renderer_contract.gd .github/workflows/renderer-component-gate.yml docs/room_visual_renderer_component_map.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Extract ObjectRenderer policy [bot]'
          git push origin HEAD:codex/bip-architecture-coordinators-02d-object-policy
