name: Diagnose Canonical Cleanup
on: pull_request
jobs:
  diagnose:
    if: github.event.pull_request.number == 1203
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/finalize-canonical-runtime
      - run: |
          mkdir -p /tmp/canonical-cleanup
          set +e
          python3 tools/apply_canonical_store_reel_cleanup.py > /tmp/canonical-cleanup/output.log 2>&1
          echo $? > /tmp/canonical-cleanup/exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: canonical-cleanup-diagnostics
          path: /tmp/canonical-cleanup
