name: Apply FloorRenderer Extraction

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02d-floor-renderer
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Apply FloorRenderer migration
        run: python tools/apply_floor_renderer_extraction.py
      - name: Commit generated migration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/field/room_visual_renderer.gd
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Extract floor profiles, assets, atlas policy, and entries [generated]'
          git push origin HEAD:codex/bip-architecture-coordinators-02d-floor-renderer
