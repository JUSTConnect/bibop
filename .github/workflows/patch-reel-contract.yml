name: Patch Reel Contract

on:
  pull_request:

jobs:
  patch-reel-contract:
    if: github.event.pull_request.number == 1196
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Add explicit reel legacy health exceptions
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/world/world_object_catalog.gd')
          text = path.read_text()
          marker = '\t\t"entity_contract":{"scope":"entity", "entity_type":"item", "entity_subtype":"power_cable_reel"'
          start = text.find(marker)
          if start < 0:
              raise SystemExit('power_cable_reel entity contract marker missing')
          line_end = text.find('\n', start)
          if line_end < 0:
              raise SystemExit('power_cable_reel entity contract line ending missing')
          exception = '\t\t"legacy_semantic_exceptions":[{"field":"damaged", "reason":"Legacy reel health flag pending runtime reel migration.", "migration_issue":1188}, {"field":"broken", "reason":"Legacy reel health flag pending runtime reel migration.", "migration_issue":1188}],\n'
          if exception not in text:
              text = text[:line_end + 1] + exception + text[line_end + 1:]
          path.write_text(text)
          if exception not in path.read_text():
              raise SystemExit('reel legacy exceptions were not written')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: patched-reel-catalog
          path: scripts/world/world_object_catalog.gd
          if-no-files-found: error
