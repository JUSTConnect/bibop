name: Patch Reel Contract

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch-reel-contract:
    if: github.event.pull_request.number == 1196
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Canonicalize reel catalog health fields
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/world/world_object_catalog.gd')
          text = path.read_text()
          exception = '\t\t"legacy_semantic_exceptions":[{"field":"damaged", "reason":"Legacy reel health flag pending runtime reel migration.", "migration_issue":1188}, {"field":"broken", "reason":"Legacy reel health flag pending runtime reel migration.", "migration_issue":1188}],\n'
          legacy_tail = '"cut":false, "damaged":false, "broken":false'
          if text.count(exception) != 1:
              raise SystemExit(f'expected one misplaced reel exception, found {text.count(exception)}')
          if text.count(legacy_tail) != 1:
              raise SystemExit(f'expected one runtime reel legacy tail, found {text.count(legacy_tail)}')
          text = text.replace(exception, '', 1)
          text = text.replace(legacy_tail, '"cut":false', 1)
          path.write_text(text)
          verified = path.read_text()
          if exception in verified or legacy_tail in verified:
              raise SystemExit('reel catalog canonicalization failed')
          PY
      - name: Commit catalog patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/world/world_object_catalog.gd
          git commit -m "Canonicalize power cable reel health fields"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
