name: GDScript Callback Signature Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gdscript-callback-signature-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check builtin callback signatures
        run: python tools/check_gdscript_builtin_callbacks.py
