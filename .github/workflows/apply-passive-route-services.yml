name: Apply Passive Route Services

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-passive-route-services:
    if: github.event.pull_request.number == 1200
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Replace legacy route resolvers
        run: |
          cat > scripts/game/cooling/cooling_routing_contour_service.gd <<'GDSCRIPT'
          extends RefCounted
          class_name CoolingRoutingContourService

          const PassiveRouteServiceRef = preload("res://scripts/game/routing/passive_route_service.gd")

          static func _objects_array(objects_by_id: Dictionary) -> Array[Dictionary]:
          	var result: Array[Dictionary] = []
          	var ids: Array = objects_by_id.keys()
          	ids.sort()
          	for id_variant in ids:
          		var value: Variant = objects_by_id[id_variant]
          		if not value is Dictionary:
          			continue
          		var object_data: Dictionary = Dictionary(value).duplicate(true)
          		if str(object_data.get("id", "")).strip_edges().is_empty():
          			object_data["id"] = str(id_variant)
          		result.append(object_data)
          	return result

          static func build_contours(objects_by_id: Dictionary) -> Dictionary:
          	var topology: Dictionary = PassiveRouteServiceRef.build_topology(_objects_array(objects_by_id))
          	var result: Dictionary = {"air_duct": {}, "water_pipe": {}}
          	for component_id in Dictionary(topology.get("components", {})).keys():
          		var component: Dictionary = Dictionary(topology["components"][component_id])
          		var kind: String = str(component.get("routing_kind", ""))
          		if not result.has(kind):
          			continue
          		result[kind][component_id] = {
          			"routing_kind": kind,
          			"route_mode": str(component.get("route_mode", "")),
          			"members": Array(component.get("member_ids", [])).duplicate(),
          			"cells": Array(component.get("cells", [])).duplicate(),
          			"computed": true
          		}
          	return result

          static func get_object_contour_id(object_data: Dictionary, object_id: String, computed_contours: Dictionary) -> String:
          	var kind: String = PassiveRouteServiceRef.get_kind(object_data)
          	for component_id in Dictionary(computed_contours.get(kind, {})).keys():
          		var members: Array = Array(Dictionary(computed_contours[kind][component_id]).get("members", []))
          		if members.has(object_id):
          			return str(component_id)
          	return ""

          static func collect_contour_issues(objects_by_id: Dictionary) -> Dictionary:
          	return PassiveRouteServiceRef.collect_issues(_objects_array(objects_by_id))

          static func collect_contour_warnings(objects_by_id: Dictionary) -> Dictionary:
          	var issues_by_id: Dictionary = collect_contour_issues(objects_by_id)
          	var result: Dictionary = {}
          	for object_id in issues_by_id.keys():
          		var messages: Array[String] = []
          		for issue_variant in Array(issues_by_id[object_id]):
          			var issue: Dictionary = Dictionary(issue_variant)
          			var code: String = str(issue.get("code", ""))
          			var message: String = str(issue.get("message", ""))
          			if code.is_empty():
          				messages.append(message)
          			else:
          				messages.append("[%s] %s" % [code, message])
          		result[object_id] = messages
          	return result
          GDSCRIPT

          cat > scripts/game/routing/wall_routing_validation_service.gd <<'GDSCRIPT'
          extends RefCounted
          class_name WallRoutingValidationService

          const PassiveRouteServiceRef = preload("res://scripts/game/routing/passive_route_service.gd")

          static func is_wall_routing_utility_object(object_data: Dictionary) -> bool:
          	return PassiveRouteServiceRef.is_passive_route(object_data)

          static func _collect_world_objects(grid_manager: Node) -> Array[Dictionary]:
          	var result: Array[Dictionary] = []
          	if grid_manager == null:
          		return result
          	var value: Variant = grid_manager.get("mission_world_objects")
          	if value is Array:
          		for row in Array(value):
          			if row is Dictionary:
          				result.append(Dictionary(row).duplicate(true))
          	return result

          static func collect_issue_rows(object_data: Dictionary, cell: Vector2i, grid_manager: Node) -> Array[Dictionary]:
          	if not is_wall_routing_utility_object(object_data):
          		return []
          	var selected: Dictionary = object_data.duplicate(true)
          	selected["position"] = cell
          	if str(selected.get("id", "")).strip_edges().is_empty():
          		selected["id"] = "constructor_preview_route"
          	var preview: Dictionary = PassiveRouteServiceRef.preview_segment(selected, _collect_world_objects(grid_manager))
          	var result: Array[Dictionary] = []
          	for issue_variant in Array(preview.get("issues", [])):
          		if issue_variant is Dictionary:
          			result.append(Dictionary(issue_variant).duplicate(true))
          	return result

          static func collect_warnings(object_data: Dictionary, cell: Vector2i, grid_manager: Node) -> Array[String]:
          	var result: Array[String] = []
          	for issue in collect_issue_rows(object_data, cell, grid_manager):
          		var code: String = str(issue.get("code", ""))
          		var message: String = str(issue.get("message", ""))
          		if code.is_empty():
          			result.append(message)
          		else:
          			result.append("[%s] %s" % [code, message])
          	return result
          GDSCRIPT
      - name: Commit service integration
        run: |
          rm -f .github/workflows/apply-passive-route-services.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/game/cooling/cooling_routing_contour_service.gd scripts/game/routing/wall_routing_validation_service.gd .github/workflows/apply-passive-route-services.yml
          git commit -m "Delegate passive route topology to shared resolver"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
