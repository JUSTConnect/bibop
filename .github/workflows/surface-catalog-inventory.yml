name: Normalize Visual Surface Catalog

on:
  pull_request:

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02b-surface-catalogs
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Normalize generated visual catalog indentation
        run: python tools/normalize_visual_catalog_indentation.py
      - name: Commit normalized implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/visual/visual_asset_catalog.gd
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Normalize VisualAssetCatalog indentation [generated]'
          git push origin HEAD:codex/bip-architecture-coordinators-02b-surface-catalogs
