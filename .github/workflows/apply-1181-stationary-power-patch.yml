name: Apply 1181 Stationary Power Patch

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-1181-stationary-power-patch.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'feature/power-entities-1181'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/power-entities-1181
          fetch-depth: 0

      - name: Apply focused integration changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          ROOT = Path('.')

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'missing anchor: {label}')
              return text.replace(old, new, 1)

          world_path = ROOT / 'scripts/world/world_object_catalog.gd'
          world = world_path.read_text(encoding='utf-8')
          world = replace_once(
              world,
              'const PassiveRouteServiceRef = preload("res://scripts/game/routing/passive_route_service.gd")\n',
              'const PassiveRouteServiceRef = preload("res://scripts/game/routing/passive_route_service.gd")\nconst StationaryPowerEntityCatalogRef = preload("res://scripts/world/stationary_power_entity_catalog.gd")\n',
              'stationary power preload',
          )
          old_alias_check = 'return PREFAB_ALIASES.has(normalized_value) or LEGACY_DOOR_ALIAS_CONFIGS.has(normalized_value) or LEGACY_ITEM_ALIAS_CONFIGS.has(normalized_value) or LEGACY_WALL_ALIAS_CONFIGS.has(normalized_value) or LEGACY_PLATFORM_ALIAS_CONFIGS.has(normalized_value) or LEGACY_TERMINAL_ALIAS_CONFIGS.has(normalized_value) or LEGACY_BIPOB_ALIAS_CONFIGS.has(normalized_value)'
          world = replace_once(world, old_alias_check, 'return StationaryPowerEntityCatalogRef.is_alias(normalized_value) or ' + old_alias_check.removeprefix('return '), 'legacy alias check')
          world = replace_once(
              world,
              'static func canonical_prefab_id(prefab_id: String) -> String:\n\tvar normalized_type: String = prefab_id.strip_edges().to_lower()\n\tif PREFAB_ALIASES.has(normalized_type):',
              'static func canonical_prefab_id(prefab_id: String) -> String:\n\tvar normalized_type: String = prefab_id.strip_edges().to_lower()\n\tif StationaryPowerEntityCatalogRef.is_alias(normalized_type):\n\t\treturn StationaryPowerEntityCatalogRef.canonical_id(normalized_type)\n\tif PREFAB_ALIASES.has(normalized_type):',
              'canonical prefab alias',
          )
          world = replace_once(
              world,
              'static func get_prefab_alias_defaults(prefab_id: String) -> Dictionary:\n\tvar normalized_prefab_id: String = prefab_id.strip_edges().to_lower()\n\tvar raw_defaults: Variant = PREFAB_ALIAS_DEFAULTS.get(normalized_prefab_id, {})',
              'static func get_prefab_alias_defaults(prefab_id: String) -> Dictionary:\n\tvar normalized_prefab_id: String = prefab_id.strip_edges().to_lower()\n\tvar stationary_defaults: Dictionary = StationaryPowerEntityCatalogRef.alias_defaults(normalized_prefab_id)\n\tif not stationary_defaults.is_empty():\n\t\treturn stationary_defaults\n\tvar raw_defaults: Variant = PREFAB_ALIAS_DEFAULTS.get(normalized_prefab_id, {})',
              'stationary alias defaults',
          )
          world = replace_once(
              world,
              'static func _get_constructor_prefab_definition(canonical_id: String) -> Dictionary:\n\tif ARCHETYPE_REGISTRY.has(canonical_id):',
              'static func _get_constructor_prefab_definition(canonical_id: String) -> Dictionary:\n\tvar stationary_definition: Dictionary = StationaryPowerEntityCatalogRef.definition(canonical_id)\n\tif not stationary_definition.is_empty():\n\t\treturn stationary_definition\n\tif ARCHETYPE_REGISTRY.has(canonical_id):',
              'constructor stationary definition',
          )
          world = replace_once(
              world,
              'static func get_archetype_definition(archetype_id: String) -> Dictionary:\n\tvar definition: Variant = ARCHETYPE_REGISTRY.get(_normalized_contract_token(archetype_id), {})\n\treturn definition.duplicate(true) if definition is Dictionary else {}',
              'static func get_archetype_definition(archetype_id: String) -> Dictionary:\n\tvar canonical_id: String = canonical_prefab_id(_normalized_contract_token(archetype_id))\n\tvar stationary_definition: Dictionary = StationaryPowerEntityCatalogRef.definition(canonical_id)\n\tif not stationary_definition.is_empty():\n\t\treturn stationary_definition\n\tvar definition: Variant = ARCHETYPE_REGISTRY.get(canonical_id, {})\n\treturn definition.duplicate(true) if definition is Dictionary else {}',
              'archetype stationary definition',
          )
          world = replace_once(
              world,
              'static func get_archetype_id_for_object(object_data: Dictionary) -> String:\n\tvar explicit_id: String = _normalized_contract_token(object_data.get("archetype_id", ""))\n\tif ARCHETYPE_REGISTRY.has(explicit_id):',
              'static func get_archetype_id_for_object(object_data: Dictionary) -> String:\n\tvar explicit_id: String = _normalized_contract_token(object_data.get("archetype_id", ""))\n\tvar canonical_explicit_id: String = canonical_prefab_id(explicit_id)\n\tif StationaryPowerEntityCatalogRef.is_family(canonical_explicit_id):\n\t\treturn canonical_explicit_id\n\tif ARCHETYPE_REGISTRY.has(explicit_id):',
              'stationary archetype id',
          )
          world = replace_once(
              world,
              'static func create_world_object(object_type: String, id_override: String = "") -> Dictionary:\n\tvar normalized_type: String = _normalized_contract_token(object_type)\n\tif is_legacy_prefab_alias(normalized_type):',
              'static func create_world_object(object_type: String, id_override: String = "") -> Dictionary:\n\tvar normalized_type: String = _normalized_contract_token(object_type)\n\tvar stationary_id: String = StationaryPowerEntityCatalogRef.canonical_id(normalized_type)\n\tif StationaryPowerEntityCatalogRef.is_family(stationary_id):\n\t\tvar stationary_object: Dictionary = create_archetype_object(stationary_id, id_override, get_prefab_alias_defaults(normalized_type))\n\t\treturn mark_legacy_source(stationary_object, normalized_type) if StationaryPowerEntityCatalogRef.is_alias(normalized_type) else stationary_object\n\tif is_legacy_prefab_alias(normalized_type):',
              'stationary object creation',
          )
          world = replace_once(
              world,
              '\treturn normalize_door_state_fields(normalize_world_object_contract(normalize_archetype_object(data)))\n\n\nstatic func _create_library_object',
              '\tvar normalized: Dictionary = normalize_door_state_fields(normalize_world_object_contract(normalize_archetype_object(data)))\n\treturn StationaryPowerEntityCatalogRef.normalize_new_record(normalized, archetype_id)\n\n\nstatic func _create_library_object',
              'stationary authoring normalization',
          )
          world = replace_once(
              world,
              'static func normalize_world_object_contract(object_data: Dictionary) -> Dictionary:',
              'static func adapt_legacy_stationary_power_record(object_data: Dictionary) -> Dictionary:\n\treturn StationaryPowerEntityCatalogRef.adapt_legacy_read_only(object_data)\n\n\nstatic func normalize_world_object_contract(object_data: Dictionary) -> Dictionary:',
              'legacy adapter facade',
          )
          world, removed = re.subn(r'\n\t\t"legacy_semantic_exceptions":\[[^\n]*"migration_issue":1181[^\n]*\],', '', world)
          if removed < 3:
              raise SystemExit(f'expected at least 3 active #1181 semantic exception blocks, removed {removed}')
          world_path.write_text(world, encoding='utf-8')

          fixture_path = ROOT / 'scripts/world/entity_contract_fixtures.gd'
          fixture = fixture_path.read_text(encoding='utf-8')
          fixture = replace_once(
              fixture,
              '"object_standard":{"allowed_entity_types":["object"], "required_capabilities":["state"], "fixture_ids":["status_object_standard"]}, "item_standard"',
              '"object_standard":{"allowed_entity_types":["object"], "required_capabilities":["state"], "fixture_ids":["status_object_standard"]}, "object_thermal":{"allowed_entity_types":["object"], "required_capabilities":["state", "health", "overheat"], "fixture_ids":["status_object_thermal"]}, "item_standard"',
              'object thermal profile',
          )
          fixture = replace_once(
              fixture,
              '"light_standard":{"allowed_entity_types":["light"], "required_capabilities":["state"], "fixture_ids":["status_light_standard"]}',
              '"light_standard":{"allowed_entity_types":["light"], "required_capabilities":["state", "health", "overheat"], "fixture_ids":["status_light_standard"]}',
              'light profile capabilities',
          )
          fixture = replace_once(
              fixture,
              '"cable_standard":{"allowed_entity_types":["cable"], "required_capabilities":["state"], "fixture_ids":["status_cable_standard"]}',
              '"cable_standard":{"allowed_entity_types":["cable"], "required_capabilities":["state", "health"], "fixture_ids":["status_cable_standard"]}',
              'cable profile capabilities',
          )
          fixture = replace_once(
              fixture,
              '\t"status_object_standard":["status_profile", "object_standard", "object", ["state"], [], "type", ["state", "health"]],\n\t"status_item_standard"',
              '\t"status_object_standard":["status_profile", "object_standard", "object", ["state"], [], "type", ["state", "health"]],\n\t"status_object_thermal":["status_profile", "object_thermal", "object", ["state", "health", "overheat"], [], "type", ["state", "health", "thermal"]],\n\t"status_item_standard"',
              'object thermal fixture',
          )
          fixture = fixture.replace('"status_light_standard":["status_profile", "light_standard", "light", ["state"], [], "type", ["state"]]', '"status_light_standard":["status_profile", "light_standard", "light", ["state", "health", "overheat"], [], "type", ["state", "health", "thermal"]]')
          fixture = fixture.replace('"status_cable_standard":["status_profile", "cable_standard", "cable", ["state"], [], "type", ["state", "routing"]]', '"status_cable_standard":["status_profile", "cable_standard", "cable", ["state", "health"], [], "type", ["state", "health", "routing", "mount"]]')
          fixture_path.write_text(fixture, encoding='utf-8')

          evaluator_path = ROOT / 'scripts/world/entity_status_evaluator.gd'
          evaluator = evaluator_path.read_text(encoding='utf-8')
          evaluator = replace_once(evaluator, '\t"light_standard":["intent", "operational"],', '\t"light_standard":["intent", "health", "thermal", "operational"],', 'light evaluator axes')
          evaluator = replace_once(evaluator, '\t"cable_standard":["operational"],', '\t"cable_standard":["health", "operational"],', 'cable evaluator axes')
          evaluator_path.write_text(evaluator, encoding='utf-8')

          contract_path = ROOT / 'scripts/world/entity_definition_contract.gd'
          contract = contract_path.read_text(encoding='utf-8')
          contract, removed = re.subn(r'\n\t"power_cable":\[[\s\S]*?\n\t\],\n\t"power_socket":\[[\s\S]*?\n\t\],', '', contract, count=1)
          if removed != 1:
              raise SystemExit('failed to remove #1181 legacy library exception entries')
          contract_path.write_text(contract, encoding='utf-8')

          resolver_path = ROOT / 'scripts/world/power_control_resolver.gd'
          resolver = resolver_path.read_text(encoding='utf-8')
          old_routes = '''\tif object_type in ["fuse_box", "fuse_box_empty", "fuse_block"]:\n\t\treturn not (bool(object_data.get("fuse_installed", false)) or state in ["installed", "ok", "active"] or object_type == "fuse_box_installed")\n\tif object_type in ["circuit_breaker", "power_breaker", "power_knife_switch", "power_switcher"]:\n\t\treturn state in ["off", "switch_off", "open"] or not bool(object_data.get("is_on", state in ["on", "switch_on", "active", "ok"]))'''
          new_routes = '''\tif object_type in ["fuse_box", "fuse_box_empty", "fuse_block"]:\n\t\tvar has_fuse: bool = bool(object_data.get("has_fuse", object_data.get("fuse_present", object_data.get("fuse_installed", state in ["installed", "ok", "active"] or object_type == "fuse_box_installed"))))\n\t\treturn not has_fuse\n\tif object_type in ["circuit_switch", "circuit_breaker", "power_breaker", "power_knife_switch", "power_switcher"]:\n\t\tvar intent: String = str(object_data.get("intent_state", "")).strip_edges().to_lower()\n\t\tif intent in ["on", "off"]:\n\t\t\treturn intent == "off"\n\t\treturn state in ["off", "switch_off", "open"] or not bool(object_data.get("is_on", state in ["on", "switch_on", "active", "ok"]))'''
          resolver = replace_once(resolver, old_routes, new_routes, 'canonical fuse and switch topology')
          resolver_path.write_text(resolver, encoding='utf-8')

          consistency_path = ROOT / 'tools/ci/check_entity_contract_consistency.gd'
          consistency = consistency_path.read_text(encoding='utf-8')
          consistency = replace_once(
              consistency,
              '\t_assert(_has_warning(socket_report, "entity_contract.legacy_semantic_exception", "connected_device_ids"), "power socket endpoint compatibility warning missing")\n\t_assert(_report_diagnostics_have_shape(socket_report), "power socket warnings have incomplete diagnostic shape")',
              '\t_assert(not _has_warning(socket_report, "entity_contract.legacy_semantic_exception"), "migrated power socket still reports a legacy semantic exception")\n\t_assert(not WorldObjectCatalog.get_constructor_prefab_definition("power_socket").has("legacy_semantic_exceptions"), "migrated power socket definition still declares #1181 exceptions")\n\t_assert(_report_diagnostics_have_shape(socket_report), "power socket diagnostics have incomplete diagnostic shape")',
              'power socket migrated expectation',
          )
          consistency_path.write_text(consistency, encoding='utf-8')

          workflow_path = ROOT / '.github/workflows/godot-parser-gate.yml'
          workflow = workflow_path.read_text(encoding='utf-8')
          workflow = replace_once(
              workflow,
              '          godot --headless --path . --script res://tools/ci/check_power_control_runtime_service.gd\n',
              '          godot --headless --path . --script res://tools/ci/check_power_control_runtime_service.gd\n          godot --headless --path . --script res://tools/ci/check_stationary_power_migration.gd\n',
              'stationary migration gate wiring',
          )
          workflow_path.write_text(workflow, encoding='utf-8')
          PY

      - name: Commit integration patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/world/world_object_catalog.gd scripts/world/entity_contract_fixtures.gd scripts/world/entity_status_evaluator.gd scripts/world/entity_definition_contract.gd scripts/world/power_control_resolver.gd tools/ci/check_entity_contract_consistency.gd .github/workflows/godot-parser-gate.yml
          git commit -m "feat(power): integrate canonical stationary power migration"
          git push origin HEAD:feature/power-entities-1181
