name: Build RouteRenderer Commit

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  build-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/route-renderer-1140
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply prepared extraction
        run: python tools/apply_route_renderer_extraction.py
      - name: Build unattached commit
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'codex/route-renderer-1140';
            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const parentSha = ref.data.object.sha;
            const parentCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: parentSha });
            const tree = [];
            for (const path of [
              'scripts/field/room_visual_renderer.gd',
              'tools/check_room_visual_renderer_component_boundary.py',
              '.github/workflows/renderer-component-gate.yml'
            ]) {
              const content = fs.readFileSync(path).toString('base64');
              const blob = await github.rest.git.createBlob({ owner, repo, content, encoding: 'base64' });
              tree.push({ path, mode: '100644', type: 'blob', sha: blob.data.sha });
            }
            const newTree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: parentCommit.data.tree.sha,
              tree
            });
            const commit = await github.rest.git.createCommit({
              owner,
              repo,
              message: 'Extract RouteRenderer policy',
              tree: newTree.data.sha,
              parents: [parentSha]
            });
            fs.writeFileSync('route-renderer-commit-sha.txt', commit.data.sha + '\n');
      - uses: actions/upload-artifact@v4
        with:
          name: route-renderer-commit-sha
          path: route-renderer-commit-sha.txt
