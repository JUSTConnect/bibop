name: Repair WallRenderer Extraction

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02d-wall-renderer
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Restore canonical wall constants and profiles
        run: |
          git show origin/main:scripts/field/room_visual_renderer.gd > /tmp/main_room_visual_renderer.gd
          python tools/repair_wall_renderer.py /tmp/main_room_visual_renderer.gd
      - name: Commit repaired WallRenderer
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/visual/renderer/wall_renderer.gd
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Repair WallRenderer canonical ownership [bot]'
          git push origin HEAD:codex/bip-architecture-coordinators-02d-wall-renderer
