name: Wall Renderer PR Inventory

on:
  pull_request:

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python tools/inventory_wall_renderer.py
      - uses: actions/upload-artifact@v4
        with:
          name: wall-renderer-inventory
          path: |
            docs/wall_renderer_inventory.tmp.json
            docs/wall_renderer_functions.tmp.txt
            scripts/field/room_visual_renderer.gd
