name: Apply WallRenderer Extraction

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02d-wall-renderer
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate WallRenderer and patch coordinator
        run: python tools/inventory_wall_renderer.py
      - name: Commit generated extraction
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/field/room_visual_renderer.gd scripts/visual/renderer/wall_renderer.gd
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Extract WallRenderer ownership [generated]'
          git push origin HEAD:codex/bip-architecture-coordinators-02d-wall-renderer
