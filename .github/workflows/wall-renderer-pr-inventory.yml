name: Wall Renderer PR Inventory

on:
  pull_request:

permissions:
  contents: write

jobs:
  inventory:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02d-wall-renderer
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python tools/inventory_wall_renderer.py
      - name: Commit temporary inventory
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/wall_renderer_inventory.tmp.json docs/wall_renderer_functions.tmp.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Generate temporary wall renderer inventory [bot]'
          git push origin HEAD:codex/bip-architecture-coordinators-02d-wall-renderer
