name: Diagnose Canonical Ownership

on:
  pull_request:

jobs:
  diagnose:
    if: github.event.pull_request.number == 1203
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture static ownership output
        run: |
          mkdir -p /tmp/canonical-ownership
          set +e
          python tools/check_canonical_runtime_ownership.py > /tmp/canonical-ownership/static.log 2>&1
          echo $? > /tmp/canonical-ownership/static.exit
          {
            echo '## legacy_candidates references'
            grep -RIn --exclude-dir=.git 'legacy_candidates(' scripts || true
            echo '## task validation message inference'
            grep -nE 'message.*(begins_with|contains|ends_with)|issue.get\("message"' scripts/game/task_test_acceptance_validation_service.gd || true
            echo '## legacy source assignments'
            grep -RIn --exclude-dir=.git -E '\["(power_source_id|physical_connection_source_id)"\][[:space:]]*=' scripts/world/power_system.gd scripts/game/bipob_cable_runtime_service.gd || true
            echo '## renderer imports in gameplay layers'
            grep -RIn --exclude-dir=.git -E 'room_visual_renderer.gd|visual/renderer/(object_renderer|route_renderer).gd' scripts/game scripts/world scripts/bipob || true
            echo '## runtime_power_feed creation-like references'
            grep -RIn --exclude-dir=.git 'runtime_power_feed' scripts || true
          } > /tmp/canonical-ownership/references.log
      - uses: actions/upload-artifact@v4
        with:
          name: canonical-ownership-diagnostics
          path: /tmp/canonical-ownership
          if-no-files-found: error
