name: Apply Passive Route Authoring

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-passive-route-authoring:
    if: github.event.pull_request.number == 1200
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Migrate passive route authoring and runtime fields
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one marker, found {count}')
              return text.replace(old, new, 1)

          catalog_path = Path('scripts/world/world_object_catalog.gd')
          catalog = catalog_path.read_text()
          catalog = replace_once(
              catalog,
              'const MovableActionServiceRef = preload("res://scripts/game/movable/movable_action_service.gd")\n',
              'const MovableActionServiceRef = preload("res://scripts/game/movable/movable_action_service.gd")\nconst PassiveRouteServiceRef = preload("res://scripts/game/routing/passive_route_service.gd")\n',
              'catalog preload'
          )
          schema_pattern = r'const COOLING_SYSTEM_WALL_ROUTING_PROPERTY_SCHEMA: Array\[Dictionary\] = \[\n.*?\n\]'
          schema_replacement = '''const COOLING_SYSTEM_WALL_ROUTING_PROPERTY_SCHEMA: Array[Dictionary] = [
          \t{"field":"mount_side","type":"enum","values":["NE","SE","SW","NW"],"default":"SW","labels":{"NE":"NE","SE":"SE","SW":"SW","NW":"NW"},"tab":"Cooling System"},
          \t{"field":"route_side_1","type":"enum","values":["NE","SE","SW","NW"],"default":"NW","labels":{"NE":"NE","SE":"SE","SW":"SW","NW":"NW"},"tab":"Cooling System"},
          \t{"field":"route_side_2","type":"enum","values":["NE","SE","SW","NW"],"default":"SE","labels":{"NE":"NE","SE":"SE","SW":"SW","NW":"NW"},"tab":"Cooling System"}
          ]'''
          catalog, count = re.subn(schema_pattern, schema_replacement, catalog, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'route schema replaced {count}')

          archetype_pattern = r'\t"external_air_duct": \{.*?\n\t"external_wall": \{'
          archetype_replacement = '''\t"external_air_duct": {
          \t\t"entity_contract":{"scope":"entity", "entity_type":"cooling_system", "entity_subtype":"air_duct", "status_profile":"cooling_passive", "property_profile":"definition_schema", "interaction_profile":"cooling", "notification_profile":"none", "power_profile":"none", "control_profile":"none", "access_profile":"none", "binding_profile":"none", "runtime_presentation_profile":"standard_cooling", "editor_presentation_profile":"standard_cooling", "validation_fixture":"default", "capabilities":{"state":false, "power":false, "health":false, "energy":false, "overheat":false, "control":false, "access":false, "bindings":false, "mount":true, "side":true, "routing":true, "test_override":false}},
          \t\t"archetype_id":"external_air_duct", "object_group":"cooling", "group":"cooling", "constructor_group":"cooling_system", "constructor_category":"Cooling System", "constructor_tab":"cooling_system", "object_type":"air_duct", "palette_label":"External Air Duct",
          \t\t"display_name_template":"External Air Duct", "name":"External Air Duct", "passive_route":true, "material":"metal", "blocks_movement":false, "blocks_vision":false, "placement_mode":"wall_mounted", "placement_surfaces":["wall"], "default_placement_surface":"wall", "requires_floor_anchor_when_wall_mounted":true, "mount":"wall", "install_mode":"wall", "is_wall_mounted":true, "changes_passability":false, "configurable":true,
          \t\t"route_mode":"outer", "routing_kind":"air_duct", "cooling_system_type":"air_duct", "cooling_system_tab":true, "routing_label":"Air Duct", "mount_side":"SW", "route_side_1":"NW", "route_side_2":"SE", "route_shape":"straight",
          \t\t"visual_family":"wall_routing_utility", "visual_surface":"wall", "wall_routing_visual_enabled":true, "property_schema":COOLING_SYSTEM_WALL_ROUTING_PROPERTY_SCHEMA
          \t},
          \t"external_water_pipe": {
          \t\t"entity_contract":{"scope":"entity", "entity_type":"cooling_system", "entity_subtype":"water_pipe", "status_profile":"cooling_passive", "property_profile":"definition_schema", "interaction_profile":"cooling", "notification_profile":"none", "power_profile":"none", "control_profile":"none", "access_profile":"none", "binding_profile":"none", "runtime_presentation_profile":"standard_cooling", "editor_presentation_profile":"standard_cooling", "validation_fixture":"default", "capabilities":{"state":false, "power":false, "health":false, "energy":false, "overheat":false, "control":false, "access":false, "bindings":false, "mount":true, "side":true, "routing":true, "test_override":false}},
          \t\t"archetype_id":"external_water_pipe", "object_group":"cooling", "group":"cooling", "constructor_group":"cooling_system", "constructor_category":"Cooling System", "constructor_tab":"cooling_system", "object_type":"water_pipe", "palette_label":"External Water Pipe",
          \t\t"display_name_template":"External Water Pipe", "name":"External Water Pipe", "passive_route":true, "material":"metal", "blocks_movement":false, "blocks_vision":false, "placement_mode":"wall_mounted", "placement_surfaces":["wall"], "default_placement_surface":"wall", "requires_floor_anchor_when_wall_mounted":true, "mount":"wall", "install_mode":"wall", "is_wall_mounted":true, "changes_passability":false, "configurable":true,
          \t\t"route_mode":"outer", "routing_kind":"water_pipe", "cooling_system_type":"water_pipe", "cooling_system_tab":true, "routing_label":"Water Pipe", "mount_side":"SW", "route_side_1":"NW", "route_side_2":"SE", "route_shape":"straight",
          \t\t"visual_family":"wall_routing_utility", "visual_surface":"wall", "wall_routing_visual_enabled":true, "property_schema":COOLING_SYSTEM_WALL_ROUTING_PROPERTY_SCHEMA
          \t},
          \t"external_wall": {'''
          catalog, count = re.subn(archetype_pattern, archetype_replacement, catalog, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'passive archetypes replaced {count}')

          catalog = replace_once(
              catalog,
              '\tdata = normalize_cable_contract(data)\n\tvar normalized_object_type: String = _normalized_contract_token(data.get("object_type", ""))\n',
              '\tdata = normalize_cable_contract(data)\n\tif PassiveRouteServiceRef.is_passive_route(data):\n\t\tdata = PassiveRouteServiceRef.normalize_segment(data)\n\tvar normalized_object_type: String = _normalized_contract_token(data.get("object_type", ""))\n',
              'catalog passive normalization hook'
          )
          catalog_path.write_text(catalog)

          contract_path = Path('scripts/world/entity_definition_contract.gd')
          contract = contract_path.read_text()
          contract = contract.replace('"facing_side":{"family":"side", "storage":"stored", "capability":"side"}, "wall_side_1":{"family":"side", "storage":"stored", "capability":"side"}, "wall_side_2":{"family":"side", "storage":"stored", "capability":"side"},', '"facing_side":{"family":"side", "storage":"stored", "capability":"side"}, "mount_side":{"family":"side", "storage":"stored", "capability":"side"}, "route_side_1":{"family":"routing", "storage":"stored", "capability":"routing"}, "route_side_2":{"family":"routing", "storage":"stored", "capability":"routing"}, "wall_side_1":{"family":"side", "storage":"legacy", "capability":"side"}, "wall_side_2":{"family":"side", "storage":"legacy", "capability":"side"},')
          contract = contract.replace('"route_mode":{"family":"routing", "storage":"stored", "capability":"routing"}, "wall_routing_mode":{"family":"routing", "storage":"stored", "capability":"routing"}, "cooling_contour_id":{"family":"routing", "storage":"stored", "capability":"routing"}, "cooling_contour_mode":{"family":"routing", "storage":"stored", "capability":"routing"}, "cooling_contour_member_ids":{"family":"routing", "storage":"stored", "capability":"routing"},', '"route_mode":{"family":"routing", "storage":"stored", "capability":"routing"}, "route_shape":{"family":"routing", "storage":"derived", "capability":"routing"}, "passive_route":{"family":"routing", "storage":"derived", "capability":"routing"}, "wall_routing_mode":{"family":"routing", "storage":"legacy", "capability":"routing"}, "cooling_contour_id":{"family":"routing", "storage":"legacy", "capability":"routing"}, "cooling_contour_mode":{"family":"routing", "storage":"legacy", "capability":"routing"}, "cooling_contour_member_ids":{"family":"routing", "storage":"legacy", "capability":"routing"},')
          contract_path.write_text(contract)

          mission_path = Path('scripts/game/mission_manager.gd')
          mission = mission_path.read_text()
          mission = replace_once(
              mission,
              'const WallRoutingValidationServiceRef = preload("res://scripts/game/routing/wall_routing_validation_service.gd")\n',
              'const WallRoutingValidationServiceRef = preload("res://scripts/game/routing/wall_routing_validation_service.gd")\nconst PassiveRouteServiceRef = preload("res://scripts/game/routing/passive_route_service.gd")\n',
              'mission passive preload'
          )
          mission = mission.replace('"route_mode":"string","cooling_contour_mode":"string","cooling_contour_id":"string","cooling_contour_member_ids":"array_string","wall_side_1":"string","wall_side_2":"string",', '"mount_side":"string","route_side_1":"string","route_side_2":"string",')
          object_ref_pattern = r'func get_map_constructor_object_ref_options\(entity_kind: String, entity_id: String, field_name: String\) -> Array\[Dictionary\]:\n.*?\n\treturn options\n'
          mission, count = re.subn(object_ref_pattern, 'func get_map_constructor_object_ref_options(_entity_kind: String, _entity_id: String, _field_name: String) -> Array[Dictionary]:\n\treturn []\n', mission, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'object ref options replaced {count}')
          mission = mission.replace('\t\t"wall_routing_mode",\n\t\t"route_mode",\n\t\t"wall_side_1",\n\t\t"wall_side_2"\n', '\t\t"mount_side",\n\t\t"route_side_1",\n\t\t"route_side_2"\n')
          route_update_pattern = r'\n\t\tif safe.has\("wall_routing_mode"\) or safe.has\("route_mode"\):.*?\n\t\tfor routing_warning in WallRoutingValidationServiceRef.collect_warnings'
          route_update_replacement = '''
          \t\tvar passive_route_update: bool = PassiveRouteServiceRef.is_passive_route(data)
          \t\tif passive_route_update:
          \t\t\tif safe.has("mount_side"):
          \t\t\t\tvar mount_side: String = PassiveRouteServiceRef.normalize_side(safe.get("mount_side", data.get("mount_side", "SW")))
          \t\t\t\tif not mount_side.is_empty():
          \t\t\t\t\tdata["mount_side"] = mount_side
          \t\t\t\t\tdata["wall_side"] = mount_side
          \t\t\tfor route_side_field in ["route_side_1", "route_side_2"]:
          \t\t\t\tif safe.has(route_side_field):
          \t\t\t\t\tdata[route_side_field] = PassiveRouteServiceRef.normalize_side(safe.get(route_side_field, data.get(route_side_field, "")))
          \t\t\tdata["route_mode"] = PassiveRouteServiceRef.get_mode(data)

          \t\tfor routing_warning in WallRoutingValidationServiceRef.collect_warnings'''
          mission, count = re.subn(route_update_pattern, route_update_replacement, mission, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'route update block replaced {count}')
          mission = replace_once(
              mission,
              '\t\tupdate_world_object_by_id(entity_id, data)\n\n\t\tif has_method("_rebuild_wall_mounted_world_object_lookup"):\n\t\t\t_rebuild_wall_mounted_world_object_lookup()\n\n\t\trefresh_world_cooling_received()\n',
              '\t\tif PassiveRouteServiceRef.is_passive_route(data):\n\t\t\t_upsert_world_state_object(PassiveRouteServiceRef.normalize_segment(data))\n\t\telse:\n\t\t\tupdate_world_object_by_id(entity_id, data)\n\n\t\tif has_method("_rebuild_wall_mounted_world_object_lookup"):\n\t\t\t_rebuild_wall_mounted_world_object_lookup()\n',
              'scoped passive route update'
          )
          mission_path.write_text(mission)

          airflow_path = Path('scripts/game/bipob_airflow_runtime_service.gd')
          airflow = airflow_path.read_text()
          airflow = replace_once(
              airflow,
              'const BipobAirflowRuntimeStateRef = preload("res://scripts/game/bipob_airflow_runtime_state.gd")\n',
              'const BipobAirflowRuntimeStateRef = preload("res://scripts/game/bipob_airflow_runtime_state.gd")\nconst PassiveRouteServiceRef = preload("res://scripts/game/routing/passive_route_service.gd")\n',
              'airflow passive preload'
          )
          airflow = replace_once(
              airflow,
              'static func _cell_has_path_role(cell_objects: Array[Dictionary]) -> bool:\n\tfor object_data in cell_objects:\n\t\tif _has_airflow_role(object_data, BipobAirflowRuntimeStateRef.ROLE_AIRFLOW_PATH_CELL):\n\t\t\treturn true\n\treturn false\n',
              'static func _cell_has_path_role(cell_objects: Array[Dictionary]) -> bool:\n\tfor object_data in cell_objects:\n\t\tif PassiveRouteServiceRef.get_kind(object_data) == PassiveRouteServiceRef.KIND_AIR_DUCT:\n\t\t\treturn true\n\t\tif _has_airflow_role(object_data, BipobAirflowRuntimeStateRef.ROLE_AIRFLOW_PATH_CELL):\n\t\t\treturn true\n\treturn false\n',
              'airflow path recognition'
          )
          airflow_path.write_text(airflow)
          PY
      - name: Commit authoring migration
        run: |
          rm -f .github/workflows/apply-passive-route-authoring.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/world/world_object_catalog.gd scripts/world/entity_definition_contract.gd scripts/game/mission_manager.gd scripts/game/bipob_airflow_runtime_service.gd .github/workflows/apply-passive-route-authoring.yml
          git commit -m "Migrate passive route authoring contract"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
