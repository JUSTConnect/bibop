name: Movable Action Contract Gate
on: [pull_request]
jobs:
  movable-action-contract-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - run: godot --headless --path . --script res://tools/ci/check_entity_contract_consistency.gd
