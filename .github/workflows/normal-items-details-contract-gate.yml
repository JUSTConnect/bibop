name: Normal Items and Details Contract Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  normal-items-details-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false

      - name: Static contract gate
        run: |
          git diff --check
          python tools/check_normal_items_details_contract.py

      - name: Godot import smoke
        run: godot --headless --path . --import

      - name: Normal item and Details behavior
        run: godot --headless --path . --script res://tools/ci/check_normal_items_details.gd

      - name: MissionManager integration
        run: godot --headless --path . --script res://tools/ci/check_normal_items_details_mission_manager.gd
