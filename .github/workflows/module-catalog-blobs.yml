name: Module Catalog Blob Export

on:
  pull_request:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02a-module-catalogs
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate implementation
        id: generate
        continue-on-error: true
        run: |
          cat tools/module_catalog_migration_part_00.pyfrag \
              tools/module_catalog_migration_part_01.pyfrag \
              tools/module_catalog_migration_part_02.txt \
              tools/module_catalog_migration_part_03.pyfrag > tools/migrate_bipob_module_catalogs.py
          python tools/migrate_bipob_module_catalogs.py > module-catalog-generation.log 2>&1
      - name: Show generation log
        if: always()
        run: cat module-catalog-generation.log || true
      - name: Upload generation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-catalog-generation-log
          path: module-catalog-generation.log
      - name: Export blobs
        if: steps.generate.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import base64, json, os, urllib.request
          paths = [
              'scripts/bipob/bipob_controller.gd',
              'scripts/bipob/bipob_module_catalog.gd',
              'scripts/bipob/bipob_module_factory.gd',
          ]
          result = {}
          for path in paths:
              payload = json.dumps({
                  'content': base64.b64encode(open(path, 'rb').read()).decode('ascii'),
                  'encoding': 'base64',
              }).encode('utf-8')
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/git/blobs",
                  data=payload,
                  headers={
                      'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'Content-Type': 'application/json',
                  },
                  method='POST',
              )
              with urllib.request.urlopen(request) as response:
                  result[path] = json.load(response)['sha']
          open('module-catalog-blob-shas.json', 'w').write(json.dumps(result, indent=2))
          print(json.dumps(result, indent=2))
          PY
      - name: Upload blob SHAs
        if: steps.generate.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: module-catalog-blob-shas
          path: module-catalog-blob-shas.json
