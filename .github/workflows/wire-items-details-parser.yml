name: Wire Items Details Parser

on:
  pull_request:

permissions:
  contents: write

jobs:
  wire-parser:
    if: github.event.pull_request.number == 1197
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch and commit parser gate
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/godot-parser-gate.yml')
          text = path.read_text()
          static_marker = '          python tools/check_power_cable_reel.py\n'
          if 'python tools/check_normal_items_details.py' not in text:
              text = text.replace(static_marker, static_marker + '          python tools/check_normal_items_details.py\n', 1)
          runtime_marker = '          godot --headless --path . --script res://tools/ci/check_power_cable_reel_mission_manager.gd\n'
          if 'check_normal_items_details.gd' not in text:
              text = text.replace(runtime_marker, runtime_marker + '          godot --headless --path . --script res://tools/ci/check_normal_items_details.gd\n          godot --headless --path . --script res://tools/ci/check_normal_items_details_mission_manager.gd\n', 1)
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/godot-parser-gate.yml
          git commit -m "Run normal items and Details regression gates"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
