name: Fix PR 1185 catalog diagnostics

on:
  push:
    branches:
      - codex/add-declarative-entity-definitions-and-completeness-gate
    paths:
      - .github/workflows/fix-pr-1185-catalog-diagnostics.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/add-declarative-entity-definitions-and-completeness-gate
          fetch-depth: 0

      - name: Preserve real diagnostics through catalog omission
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/game/map_constructor_prefab_catalog.gd")
          source = path.read_text(encoding="utf-8")

          old_header = '''static func get_catalog_entries() -> Array[Dictionary]:\n\tvar entries: Array[Dictionary] = []\n\t_entity_contract_diagnostics_cache = []\n\tvar seen_prefab_ids: Dictionary = {}\n\tfor prefab_id in PREFAB_ORDER:\n'''
          new_header = '''static func get_catalog_entries(prefab_order: Array[String] = []) -> Array[Dictionary]:\n\tvar entries: Array[Dictionary] = []\n\t_entity_contract_diagnostics_cache = []\n\tvar seen_prefab_ids: Dictionary = {}\n\tvar requested_prefab_order: Array[String] = PREFAB_ORDER.duplicate() if prefab_order.is_empty() else prefab_order.duplicate()\n\tfor prefab_id in requested_prefab_order:\n'''
          if source.count(old_header) != 1:
              raise SystemExit(f"expected one catalog header, found {source.count(old_header)}")
          source = source.replace(old_header, new_header, 1)

          old_block = '''\t\tif catalog_row.is_empty() or not bool(catalog_row.get("placement_contract_valid", false)):\n\t\t\t_entity_contract_diagnostics_cache.append({"prefab_id": prefab_id, "canonical_prefab_id": WorldObjectCatalogRef.canonical_prefab_id(prefab_id), "errors": [{"code":"entity_contract.missing", "field":"entity_contract", "message":"Missing placement or entity contract."}]})\n\t\t\tcontinue\n\t\tif not bool(catalog_row.get("entity_contract_valid", false)):\n\t\t\tvar diag_report: Dictionary = WorldObjectCatalogRef.validate_entity_definition_contract(prefab_id)\n\t\t\t_entity_contract_diagnostics_cache.append({"prefab_id": prefab_id, "canonical_prefab_id": WorldObjectCatalogRef.canonical_prefab_id(prefab_id), "errors": Array(diag_report.get("errors", []))})\n\t\t\tcontinue\n'''
          new_block = '''\t\tif catalog_row.is_empty() or not bool(catalog_row.get("placement_contract_valid", false)):\n\t\t\tvar missing_canonical_id: String = str(catalog_row.get("canonical_prefab_id", WorldObjectCatalogRef.canonical_prefab_id(prefab_id)))\n\t\t\tvar missing_report: Dictionary = WorldObjectCatalogRef.validate_entity_definition_contract(missing_canonical_id)\n\t\t\tvar missing_errors: Array = Array(missing_report.get("errors", [])).duplicate(true)\n\t\t\tmissing_errors.append({"code":"placement_contract.missing", "field":"placement_contract", "message":"Entity definition is missing a canonical constructor placement contract."})\n\t\t\t_entity_contract_diagnostics_cache.append({"prefab_id": prefab_id, "canonical_prefab_id": missing_canonical_id, "errors": missing_errors})\n\t\t\tcontinue\n\t\tif not bool(catalog_row.get("entity_contract_valid", false)):\n\t\t\tvar canonical_prefab_id: String = str(catalog_row.get("canonical_prefab_id", WorldObjectCatalogRef.canonical_prefab_id(prefab_id)))\n\t\t\tvar diag_report: Dictionary = WorldObjectCatalogRef.validate_entity_definition_contract(canonical_prefab_id)\n\t\t\t_entity_contract_diagnostics_cache.append({"prefab_id": prefab_id, "canonical_prefab_id": canonical_prefab_id, "errors": Array(diag_report.get("errors", [])).duplicate(true)})\n\t\t\tcontinue\n'''
          if source.count(old_block) != 1:
              raise SystemExit(f"expected one diagnostics block, found {source.count(old_block)}")
          path.write_text(source.replace(old_block, new_block, 1), encoding="utf-8")
          PY

      - name: Remove one-shot workflow and push fix
        shell: bash
        run: |
          git config user.name "Bipob Assistant"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-pr-1185-catalog-diagnostics.yml
          git add scripts/game/map_constructor_prefab_catalog.gd
          git commit -m "Preserve catalog omission diagnostics"
          git push origin HEAD:codex/add-declarative-entity-definitions-and-completeness-gate
