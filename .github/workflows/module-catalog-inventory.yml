name: Module Catalog Migration

on:
  pull_request:
  push:
    branches:
      - codex/bip-architecture-coordinators-02a-module-catalogs

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bip-architecture-coordinators-02a-module-catalogs
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate catalog, factory and controller delegates
        run: |
          cat tools/module_catalog_migration_part_00.pyfrag \
              tools/module_catalog_migration_part_01.pyfrag \
              tools/module_catalog_migration_part_02.txt \
              tools/module_catalog_migration_part_03.pyfrag > tools/migrate_bipob_module_catalogs.py
          python tools/migrate_bipob_module_catalogs.py
      - name: Commit generated implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/bipob/bipob_controller.gd scripts/bipob/bipob_module_catalog.gd scripts/bipob/bipob_module_factory.gd
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Extract Bipob module catalog and factory [catalog generated]'
          git push origin HEAD:codex/bip-architecture-coordinators-02a-module-catalogs
