name: Diagnose Movable Result

on:
  pull_request:

jobs:
  diagnose:
    if: github.event.pull_request.number == 1198
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - run: godot --headless --path . --import
      - run: |
          set +e
          godot --headless --path . --script res://tools/ci/check_movable_mission_manager.gd > /tmp/result.log 2>&1
          echo "$?" > /tmp/result.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: movable-result
          path: /tmp/result.*
