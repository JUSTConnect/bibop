name: Fix Movable Structural Commit

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-move:
    if: github.event.pull_request.number == 1198
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch MissionManager move commit
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/game/mission_manager.gd')
          text = path.read_text()
          old = '''\tvar object_data: Dictionary = get_world_object_by_id(object_id)
          \tvar target_surface: Dictionary = PlatformOccupancyServiceRef.get_surface_context_for_cell(target_cell, mission_world_objects)
          \tobject_data = PlatformOccupancyServiceRef.attach_entity_to_surface(object_data, target_surface)
          \t_move_world_state_object(object_id, target_cell, object_data)
          \tvar result: Dictionary = preview.duplicate(true)
          '''
          new = '''\tvar object_data: Dictionary = get_world_object_by_id(object_id)
          \tvar from_cell: Vector2i = WorldObjectCatalogRef.to_world_cell(object_data.get("position", Vector2i(-1, -1)), Vector2i(-1, -1))
          \tvar target_surface: Dictionary = PlatformOccupancyServiceRef.get_surface_context_for_cell(target_cell, mission_world_objects)
          \tvar structural_patch: Dictionary = PlatformOccupancyServiceRef.attach_entity_to_surface(object_data, target_surface)
          \tstructural_patch.erase("position")
          \tvar move_commit: Dictionary = _move_world_state_object(object_id, target_cell, structural_patch)
          \tif not bool(move_commit.get("ok", false)):
          \t\treturn move_commit
          \tvar result: Dictionary = preview.duplicate(true)
          '''
          if text.count(old) != 1:
              raise SystemExit(f'move commit marker found {text.count(old)} times')
          text = text.replace(old, new, 1)
          text = text.replace('result["from"] = Dictionary(preview.get("details", {})).get("from_cell", object_data.get("position", Vector2i(-1, -1)))', 'result["from"] = from_cell', 1)
          path.write_text(text)
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/game/mission_manager.gd
          git commit -m "Commit movable destination without stale position"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
