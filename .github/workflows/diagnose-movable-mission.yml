name: Diagnose Movable Mission

on:
  pull_request:

jobs:
  diagnose:
    if: github.event.pull_request.number == 1198
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: false
      - run: godot --headless --path . --import
      - name: Capture integration output
        run: |
          set +e
          timeout 60s godot --headless --path . --script res://tools/ci/check_movable_mission_manager.gd > /tmp/movable-mission.log 2>&1
          echo "$?" > /tmp/movable-mission.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: movable-mission-diagnostics
          path: |
            /tmp/movable-mission.log
            /tmp/movable-mission.exit
          if-no-files-found: error
