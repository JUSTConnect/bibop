name: Apply Crate Catalog Helper

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-helper:
    if: github.event.pull_request.number == 1198
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Add canonical crate helper
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/world/world_object_catalog.gd')
          text = path.read_text()
          marker = 'static func is_world_object_movable(object_data: Dictionary) -> bool:\n'
          helper = 'static func is_crate_object(object_data: Dictionary) -> bool:\n\treturn MovableActionServiceRef.is_crate(object_data)\n\n'
          if helper not in text:
              if text.count(marker) != 1:
                  raise SystemExit('movable helper marker missing')
              text = text.replace(marker, helper + marker, 1)
          path.write_text(text)
          PY
      - name: Commit helper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/world/world_object_catalog.gd
          git commit -m "Add canonical crate catalog helper"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
