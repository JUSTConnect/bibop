name: Fix Reel Static Gate

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-reel-static-gate:
    if: github.event.pull_request.number == 1196
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch BindingStore exclusion assertion
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/check_power_cable_reel.py')
          text = path.read_text()
          old = '("reel service does not create bindings", "create_binding(" not in service and "runtime_power_feed" not in binding),'
          new = '("reel service does not create bindings", "create_binding(" not in service),\n    ("BindingStore rejects runtime feed role", \'"runtime_power_feed"\' in binding and "PHYSICAL_RELATION_ROLES" in binding),'
          if text.count(old) != 1:
              raise SystemExit('static gate marker missing')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit and remove workflow
        run: |
          rm -f .github/workflows/fix-reel-static-gate.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/check_power_cable_reel.py .github/workflows/fix-reel-static-gate.yml
          git commit -m "Fix runtime feed BindingStore exclusion gate"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
