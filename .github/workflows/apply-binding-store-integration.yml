name: Apply BindingStore Integration

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-binding-store-integration:
    if: github.event.pull_request.number == 1195
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch MissionManager snapshot wrappers
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/game/mission_manager.gd')
          text = path.read_text()
          old = '''func replace_world_state_snapshot(objects: Array[Dictionary]) -> Dictionary:
          \tvar bounds_check := _validate_world_state_store_snapshot_bounds(objects)
          \tif not bool(bounds_check.get("ok", false)):
          \t\treturn bounds_check
          \treturn world_state_store.replace_snapshot(objects)
          '''
          new = '''func replace_world_state_snapshot(objects: Array[Dictionary]) -> Dictionary:
          \tvar bounds_check: Dictionary = _validate_world_state_store_snapshot_bounds(objects)
          \tif not bool(bounds_check.get("ok", false)):
          \t\treturn bounds_check
          \treturn world_state_store.replace_serialized_snapshot({"format_version": 0, "objects": objects})

          func replace_world_state_serialized_snapshot(snapshot: Dictionary) -> Dictionary:
          \tvar raw_entities: Variant = snapshot.get("entities", snapshot.get("objects", []))
          \tif not (raw_entities is Array):
          \t\treturn {"ok": false, "success": false, "code": "missing", "reason_code": "missing", "details": {"field": "entities"}}
          \tvar entities: Array[Dictionary] = []
          \tfor entity_value in Array(raw_entities):
          \t\tif not (entity_value is Dictionary):
          \t\t\treturn {"ok": false, "success": false, "code": "missing", "reason_code": "missing", "details": {"field": "entities", "reason": "entity_not_dictionary"}}
          \t\tentities.append(Dictionary(entity_value))
          \tvar bounds_check: Dictionary = _validate_world_state_store_snapshot_bounds(entities)
          \tif not bool(bounds_check.get("ok", false)):
          \t\treturn bounds_check
          \treturn world_state_store.replace_serialized_snapshot(snapshot)

          func get_world_state_serializable_snapshot() -> Dictionary:
          \treturn world_state_store.get_serializable_snapshot()
          '''
          if text.count(old) != 1:
              raise SystemExit(f'expected one MissionManager wrapper, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit integration and remove workflow
        run: |
          rm -f .github/workflows/apply-binding-store-integration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/game/mission_manager.gd .github/workflows/apply-binding-store-integration.yml
          git commit -m "Route world snapshots through BindingStore migration"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
