name: Apply PR 1127 lifecycle fixes

on:
  push:
    branches:
      - codex/remove-periodic-hud-and-inspector-repair-loops
    paths:
      - .github/workflows/apply-pr-1127-fixes.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/remove-periodic-hud-and-inspector-repair-loops
          fetch-depth: 0

      - name: Apply reviewed fixes
        run: python tools/apply_1127_fixes.py

      - name: Validate generated changes
        run: |
          python tools/check_runtime_readiness_service.py
          python tools/check_event_driven_runtime_hud.py
          git diff --check

      - name: Commit fixes and remove one-shot helpers
        run: |
          rm -f tools/apply_1127_fixes.py
          rm -f .github/workflows/apply-pr-1127-fixes.yml
          git config user.name "ChatGPT Project Maintainer"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix event-driven HUD lifecycle and invalidation"
          git push origin HEAD:codex/remove-periodic-hud-and-inspector-repair-loops
