name: Build Module Factory Cleanup

on:
  pull_request:

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Patch factory
        run: python tools/_patch_module_factory_cleanup.py
      - name: Upload patched factory
        uses: actions/upload-artifact@v4
        with:
          name: patched-bipob-module-factory
          path: scripts/bipob/bipob_module_factory.gd
