name: Fix Versioned Loader Result

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-loader-result:
    if: github.event.pull_request.number == 1202
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Normalize MissionManager success flag
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/game/mission_manager.gd')
          text = path.read_text()
          old = '\tvar result: Dictionary = world_result.duplicate(true)\n\tresult["migration"] = migration.duplicate(true)\n'
          new = '\tvar result: Dictionary = world_result.duplicate(true)\n\tresult["success"] = bool(world_result.get("ok", false))\n\tresult["migration"] = migration.duplicate(true)\n'
          if text.count(old) != 1:
              raise SystemExit('MissionManager migration result marker missing')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit fix and remove debug workflow
        run: |
          rm -f .github/workflows/versioned-mission-debug.yml
          rm -f .github/workflows/fix-versioned-loader-result.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/game/mission_manager.gd .github/workflows/versioned-mission-debug.yml .github/workflows/fix-versioned-loader-result.yml
          git commit -m "Normalize versioned loader success result"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
