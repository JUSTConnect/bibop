name: Patch Task Validation Code

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.number == 1203
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/finalize-canonical-runtime
          fetch-depth: 0
      - name: Replace message inference with issue code
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/game/task_test_acceptance_validation_service.gd')
          text = path.read_text()
          old = 'if str(issue.get("message", "")).begins_with("Route crosses another route at ") and str(issue.get("severity", "")) == "error":'
          new = 'var issue_code: String = str(issue.get("code", issue.get("reason_code", ""))).strip_edges().to_lower()\n\t\tvar is_route_crossing_issue: bool = issue_code.contains("route") and (issue_code.contains("cross") or issue_code.contains("overlap"))\n\t\tif is_route_crossing_issue and str(issue.get("severity", "")) == "error":'
          if text.count(old) != 1:
              raise SystemExit('TASK TEST route crossing message marker missing')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add scripts/game/task_test_acceptance_validation_service.gd
          git commit -m 'Use machine code for TASK TEST route issue'
          git push
