name: Audit Passive Routes

on:
  pull_request:

jobs:
  audit-passive-routes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect passive route paths
        run: |
          {
            echo '## route fields and services'
            grep -RIn --exclude-dir=.git -E 'routing_kind|route_mode|wall_side_1|wall_side_2|route_sides|cooling_contour|contour_id|member_ids|air_duct|water_pipe' scripts tools docs || true
            echo '## passive route state and capabilities'
            grep -RIn --exclude-dir=.git -E 'air_duct|water_pipe|flow_state|blocked_state|durability|test_override|power_profile|control_profile|access_profile' scripts/world scripts/game tools || true
            echo '## contour and constructor consumers'
            grep -RIn --exclude-dir=.git -E 'CoolingRoutingContourService|build_contours|get_object_contour_id|collect_contour_warnings|wall_side_1|wall_side_2' scripts/game scripts/ui scripts/world tools || true
          } > /tmp/passive-routes-audit.txt
      - uses: actions/upload-artifact@v4
        with:
          name: passive-routes-audit
          path: /tmp/passive-routes-audit.txt
          if-no-files-found: error
